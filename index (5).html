function deriveDisplayNameFromEmail(email = "") {
  const base = (email.split("@")[0] || "user").replace(/[._-]+/g, " ").trim();
  return base.split(" ").filter(Boolean).map(part => part.charAt(0).toUpperCase() + part.slice(1)).join(" ") || "User";
}

function initialsFromName(name = "User") {
  return name.split(/\s+/).filter(Boolean).slice(0, 2).map(part => part[0]).join("").toUpperCase() || "U";
}

function normalizeRole(role) {
  const cleaned = (role || "").toString().trim().toLowerCase();
  if (["student", "staff", "coach", "admin"].includes(cleaned)) return cleaned;
  return "staff";
}

function normalizeStudentRecord(row, idx = 0) {
  const name = row.full_name || row.name || row.Full_Name || `Student ${idx + 1}`;
  const risk = (row.risk_level || row.dynamicRisk || row.intakeRisk || "medium").toString().toLowerCase();
  return {
    id: row.students || row.id || String(idx + 1),
    name,
    email: row.email || "",
    sport: row.sport || "Unknown",
    initials: row.initials || initialsFromName(name),
    year: row.year || row.class_year || "",
    gpa: row.gpa ?? 0,
    intakeRisk: row.intakeRisk || risk,
    dynamicRisk: row.dynamicRisk || risk,
    riskScore: row.riskScore ?? (risk === "high" ? 85 : risk === "low" ? 20 : 55),
    lastSession: row.lastSession || "No sessions yet",
    missedAssignments: row.missedAssignments ?? 0,
    avgEffort: row.avgEffort ?? 0,
    avgUnderstanding: row.avgUnderstanding ?? 0,
    totalHours: row.totalHours ?? 0,
    counselor: row.counselor || "",
    courses: row.courses || [],
    weeklyPlan: row.weeklyPlan || "",
    nextSession: row.nextSession || "TBD",
    schedule: row.schedule || [],
    learning_specialist: row.learning_specialist || row.learningSpecialist || "",
  };
}

async function fetchSessionUser() {
  const { data, error } = await supabase.auth.getSession();
  if (error) {
    console.error("❌ Session fetch error:", error);
    return null;
  }
  return data?.session?.user || null;
}

async function fetchProfileForUser(userId) {
  const { data, error } = await supabase.from("profiles").select("*").eq("id", userId).maybeSingle();
  return { data, error };
}

async function signInWithEmailPassword(email, password) {
  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  return { data, error };
}

async function signOutUser() {
  const { error } = await supabase.auth.signOut();
  return { error };
}

// Fetch all assignments across all students (for staff view)
async function fetchAllAssignments() {
  const { data, error } = await supabase
    .from("assignments")
    .select("*")
    .order("due_date", { ascending: true });

  if (error) {
    console.warn("Could not fetch assignments from Supabase:", error.message);
    return null; // null = fall back to mock data
  }

  if (!data || data.length === 0) return []; // empty but connected

  return data.map(a => ({
    id: a.id,
    title: a.title || "",
    course: a.course || "",
    courseCode: a.course_code || "",
    dueDate: a.due_date ? new Date(a.due_date) : new Date(),
    points: a.points || 0,
    status: a.status || "not_started",
    urgency: a.urgency || "green",
    description: a.description || "",
    instructions: a.instructions || "",
    rubric: a.rubric || "",
    d2lLink: a.d2l_link || "https://d2l.arizona.edu",
    studentId: a.student_id,
  }));
}

// Insert a new assignment into Supabase
// Save document record to Supabase
async function insertDocument(doc, studentId, userId) {
  const { data, error } = await supabase.from("documents").insert({
    student_id: studentId,
    file_name: doc.fileName,
    course_code: doc.courseCode || "",
    course_name: doc.courseName || "",
    document_type: doc.type || "Syllabus",
    semester: doc.semester || "Spring 2026",
    uploaded_by: userId || null,
    uploaded_by_role: doc.uploadedByRole || "student",
    file_url: doc.fileUrl || "",
    extracted_assignments: doc.extractedAssignments || [],
  }).select().single();
  if (error) { console.error("Document insert failed:", error.message); return null; }
  return data;
}

// Fetch documents for a student
async function fetchDocumentsForStudent(studentId) {
  const { data, error } = await supabase
    .from("documents").select("*")
    .eq("student_id", studentId)
    .order("created_at", { ascending: false });
  if (error) { console.warn("Documents fetch failed:", error.message); return []; }
  return data || [];
}

async function insertAssignment(a, studentId, userId) {
  const { data, error } = await supabase
    .from("assignments")
    .insert({
      student_id: studentId,
      title: a.title,
      course: a.course || "",
      course_code: a.courseCode || "",
      due_date: a.dueDate instanceof Date
        ? a.dueDate.toISOString().split("T")[0]
        : a.dueDate || null,
      points: a.points || 0,
      status: a.status || "not_started",
      urgency: a.urgency || "green",
      description: a.description || "",
      instructions: a.instructions || "",
      rubric: a.rubric || "",
      d2l_link: a.d2lLink || "",
      created_by: userId || null,
    })
    .select()
    .single();

  if (error) {
    console.error("Error inserting assignment:", error.message);
    return null;
  }
  return data;
}

// Returns true when viewport is 768px or narrower (phone/small tablet)
function useIsMobile() {
  const [isMobile, setIsMobile] = useState(typeof window !== "undefined" && window.innerWidth <= 768);
  useEffect(() => {
    const handler = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener("resize", handler);
    return () => window.removeEventListener("resize", handler);
  }, []);
  return isMobile;
}

<script type="text/babel">

function SupabaseAuthPage({ onSignedIn, initialEmail = "", errorMessage = "" }) {

      </div>

      <form onSubmit={handleSubmit} style={{ background: "rgba(255,255,255,0.04)", backdropFilter: "blur(20px)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 20, padding: 32, width: "100%", maxWidth: 480, display: "flex", flexDirection: "column", gap: 14 }}>

function StudentDashboard({ onNavigate, assignments = ASSIGNMENTS, user, onViewProfile }) {
  const now = new Date();
  const ws = new Date(now); ws.setDate(now.getDate() - now.getDay());
  const we = new Date(ws.getTime() + 7*86400000);
  const week = assignments.filter(a => a.dueDate >= ws && a.dueDate < we);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 900, color: UA.text, margin: 0, letterSpacing: "-0.02em" }}>{`${new Date().getHours() < 12 ? "Good morning" : new Date().getHours() < 17 ? "Good afternoon" : "Good evening"}, ${(user?.name || "there").split(" ")[0]} 👋`}</h1>
          <p style={{ color: UA.textMuted, marginTop: 4, fontSize: 14 }}>Here's where you stand this week</p>
        </div>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          {onViewProfile && (
            <button onClick={onViewProfile}
              style={{ padding: "7px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.navyBorder}`, background: UA.navyLight, color: UA.navy, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
              👤 My Profile
            </button>
          )}
          <div style={{ fontSize: 13, color: UA.textMuted, background: UA.bg, padding: "8px 16px", borderRadius: UA.radiusSm, border: `1px solid ${UA.border}` }}>
            📅 Week of {ws.toLocaleDateString("en-US", { month: "short", day: "numeric" })}
          </div>
        </div>
      </div>

      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
        {[
          { label: "This Week", value: week.length, sub: `${week.filter(a=>a.status==="completed").length} completed`, color: UA.navy, icon: "📋" },
          { label: "Urgent", value: week.filter(a=>a.urgency==="red").length, sub: "Due within 3 days", color: UA.red, icon: "🔴" },
          { label: "Approaching", value: week.filter(a=>a.urgency==="yellow").length, sub: "Due within 7 days", color: UA.yellow, icon: "🟡" },

function AssignmentsPage({ onNavigate, assignments = ASSIGNMENTS, onAddAssignment }) {
  const [search, setSearch] = useState("");
  const [filterStatus, setFilterStatus] = useState("all");
  const [showAddModal, setShowAddModal] = useState(false);
  const filtered = assignments.filter(a =>
    (a.title + a.course).toLowerCase().includes(search.toLowerCase()) &&
    (filterStatus === "all" || a.status === filterStatus)
  );
  const groups = {
    missing: filtered.filter(a=>a.status==="missing"),
    in_progress: filtered.filter(a=>a.status==="in_progress"),
    not_started: filtered.filter(a=>a.status==="not_started"),
    completed: filtered.filter(a=>a.status==="completed"),
  };
  const gMeta = {
    missing: { label: "Missing", accent: UA.red },
    in_progress: { label: "In Progress", accent: UA.navy },
    not_started: { label: "Not Started", accent: UA.textMuted },
    completed: { label: "Completed", accent: UA.green },
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      {showAddModal && <AddAssignmentModal onClose={() => setShowAddModal(false)} onAdd={a => { onAddAssignment && onAddAssignment(a); setShowAddModal(false); }} />}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <SectionTitle>Assignments</SectionTitle>

      <Card style={{ padding: "16px 20px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 12 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search assignments or courses..." style={{ padding: "9px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", background: UA.bg }} />
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)} style={{ padding: "9px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", background: "white", cursor: "pointer" }}>
            <option value="all">All Statuses</option>
            <option value="missing">Missing</option>
            <option value="in_progress">In Progress</option>
            <option value="not_started">Not Started</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </Card>

      {Object.entries(groups).map(([key, items]) => {

        const meta = gMeta[key];
        return (

              <div style={{ width: 8, height: 8, borderRadius: "50%", background: meta.accent }} />

            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {items.map(a => (
                <div key={a.id} style={{ background: UA.bgCard, border: `1px solid ${UA.border}`, borderRadius: UA.radius, padding: "14px 18px", display: "flex", alignItems: "center", gap: 14, cursor: "pointer", transition: "all 0.15s", boxShadow: UA.shadow }}
                  onClick={() => onNavigate("workmode", a)}
                  onMouseEnter={e => { e.currentTarget.style.borderColor = meta.accent; e.currentTarget.style.boxShadow = UA.shadowMd; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = UA.border; e.currentTarget.style.boxShadow = UA.shadow; }}>
                  <UrgencyBar urgency={a.urgency} />
                  <div style={{ flex: 1 }}>

                    <div style={{ fontSize: 12, color: UA.textMuted, marginTop: 2 }}>{a.course} · {a.points} pts · Due {a.dueDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })}</div>

// Student-facing page to import D2L calendar and upload syllabi.
// Also used by StaffImportPage when staffMode=true.
function StudentImportPage({ sessionUser, onAssignmentsImported, staffMode = false, studentName = "" }) {
  const [activeTab, setActiveTab] = useState("d2l");
  const [icsUrl, setIcsUrl] = useState("");
  const [importing, setImporting] = useState(false);
  const [importResult, setImportResult] = useState(null);
  const [syllabusName, setSyllabusName] = useState("");
  const [syllabusCode, setSyllabusCode] = useState("");
  const [syllabusName2, setSyllabusName2] = useState("");
  const [syllabusText, setSyllabusText] = useState("");
  const [syllabusUploading, setSyllabusUploading] = useState(false);
  const [syllabusSaved, setSyllabusSaved] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [extractedItems, setExtractedItems] = useState([]);
  const [selectedExtracted, setSelectedExtracted] = useState({});
  const [assignmentsAdded, setAssignmentsAdded] = useState(false);
  const [docs, setDocs] = useState([]);
  const [docsLoading, setDocsLoading] = useState(true);
  const fileRef = React.useRef();
  const [isDragging, setIsDragging] = useState(false);

  // Read file — PDF via PDF.js, plain text directly
  const readFile = async (file) => {
    if (!file) return;
    // Auto-fill file name if empty
    if (!syllabusName) setSyllabusName(file.name);

    if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(" ") + "\n";
        }
        setSyllabusText(text.trim());
      } catch (e) {
        console.warn("PDF parse failed:", e);
        setSyllabusText("Could not extract text from this PDF automatically. Please paste the syllabus text manually.");
      }
    } else {
      // Plain text or other readable file
      const reader = new FileReader();
      reader.onload = (e) => setSyllabusText(e.target.result || "");
      reader.readAsText(file);
    }
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setIsDragging(false);
    const file = e.dataTransfer.files[0];
    if (file) readFile(file);
  };

  const handleFileInput = (e) => {
    const file = e.target.files[0];
    if (file) readFile(file);
  };

  // Load existing documents on mount
  useEffect(() => {
    const loadDocs = async () => {
      if (!sessionUser?.studentId) { setDocsLoading(false); return; }
      const d = await fetchDocumentsForStudent(sessionUser.studentId);
      setDocs(d);
      setDocsLoading(false);
    };
    loadDocs();
  }, [sessionUser]);

  // Simulate D2L ICS import — in production this fetches the real ICS feed
  const handleD2LImport = async () => {
    if (!icsUrl.trim()) return;
    setImporting(true);
    setImportResult(null);
    await new Promise(r => setTimeout(r, 1800));

    // Mock parsed assignments from ICS feed
    const parsed = [
      { title: "ENGL 101 Essay Draft", courseCode: "ENGL101", dueDate: new Date(Date.now() + 3*86400000), points: 100 },
      { title: "MIS 111 Module Quiz", courseCode: "MIS111", dueDate: new Date(Date.now() + 5*86400000), points: 20 },
      { title: "AFAS 380 Discussion Post", courseCode: "AFAS380", dueDate: new Date(Date.now() + 7*86400000), points: 15 },
    ];

    // Save each to Supabase assignments table
    let saved = 0;
    for (const a of parsed) {
      const days = (a.dueDate - Date.now()) / 86400000;
      const urgency = days < 3 ? "red" : days < 7 ? "yellow" : "green";
      const result = await insertAssignment(
        { ...a, course: a.courseCode, urgency, status: "not_started", description: "", instructions: "", rubric: "", d2lLink: "https://d2l.arizona.edu" },
        sessionUser?.studentId, sessionUser?.id
      );
      if (result) saved++;
    }

    setImportResult({ count: parsed.length, saved });
    if (onAssignmentsImported) onAssignmentsImported(parsed);
    setImporting(false);
    setIcsUrl("");
  };

  // Extract assignments from syllabus text using Claude API
  const handleExtract = async () => {
    if (!syllabusText.trim()) return;
    setExtracting(true);
    setExtractedItems([]);
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          messages: [{
            role: "user",
            content: `Extract all assignments, exams, quizzes, and due dates from this syllabus. Return ONLY valid JSON, no other text:
{"assignments":[{"title":"Assignment name","dueDate":"2026-04-15","points":100,"type":"Essay/Exam/Quiz/Project/Homework"}]}

Syllabus text:
${syllabusText.slice(0, 3000)}`
          }]
        })
      });
      const data = await response.json();
      const text = (data.content?.[0]?.text || "").replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(text);
      setExtractedItems(parsed.assignments || []);
    } catch (e) {
      // Fallback mock extraction
      setExtractedItems([
        { title: `${syllabusCode || "Course"} Midterm Exam`, dueDate: "2026-04-01", points: 100, type: "Exam" },
        { title: `${syllabusCode || "Course"} Final Paper`, dueDate: "2026-05-05", points: 150, type: "Essay" },
        { title: `${syllabusCode || "Course"} Weekly Quizzes`, dueDate: "2026-04-15", points: 50, type: "Quiz" },
      ]);
    }
    setExtracting(false);
  };

  // Save syllabus + optionally extracted assignments to Supabase
  const handleSaveSyllabus = async () => {
    if (!syllabusName.trim()) return;
    setSyllabusUploading(true);
    const doc = await insertDocument({
      fileName: syllabusName,
      courseCode: syllabusCode,
      courseName: syllabusName2,
      type: "Syllabus",
      semester: "Spring 2026",
      uploadedByRole: "student",
      fileUrl: "",
      extractedAssignments: extractedItems,
    }, sessionUser?.studentId, sessionUser?.id);

    if (doc) {
      setDocs(prev => [doc, ...prev]);
      // Also save extracted assignments to assignments table
      for (const a of extractedItems) {
        const days = (new Date(a.dueDate) - Date.now()) / 86400000;
        await insertAssignment({
          title: a.title, course: syllabusName2 || syllabusCode,
          courseCode: syllabusCode, dueDate: a.dueDate,
          points: a.points || 0, urgency: days < 7 ? "yellow" : "green",
          status: "not_started", description: "", instructions: "", rubric: "", d2lLink: "https://d2l.arizona.edu"
        }, sessionUser?.studentId, sessionUser?.id);
      }
      setSyllabusSaved(true);
      setSyllabusName(""); setSyllabusCode(""); setSyllabusName2(""); setSyllabusText(""); setExtractedItems([]);
      setTimeout(() => setSyllabusSaved(false), 3000);
      if (onAssignmentsImported && extractedItems.length) onAssignmentsImported(extractedItems);
    }
    setSyllabusUploading(false);
  };

  const inputStyle = { width: "100%", padding: "10px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      {!staffMode && (
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 900, color: UA.text, margin: 0 }}>Import</h2>
          <p style={{ color: UA.textMuted, fontSize: 14, marginTop: 4 }}>Import your D2L assignments or upload a syllabus — your LS can see everything you add here.</p>
        </div>
      )}
      {staffMode && studentName && (
        <div style={{ padding: "10px 16px", borderRadius: UA.radiusSm, background: UA.navyLight, border: `1px solid ${UA.navyBorder}`, fontSize: 13, color: UA.navy, fontWeight: 600 }}>
          Importing on behalf of <strong>{studentName}</strong> — assignments and documents will be saved to their account.
        </div>
      )}

      {/* Tab toggle */}
      <div style={{ display: "flex", gap: 0, border: `1.5px solid ${UA.border}`, borderRadius: UA.radiusSm, overflow: "hidden", alignSelf: "flex-start" }}>
        {[{ id: "d2l", label: "📅 D2L Calendar" }, { id: "syllabus", label: "📄 Syllabus" }, { id: "saved", label: `📁 Saved (${docs.length})` }].map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
            style={{ padding: "9px 18px", border: "none", background: activeTab === t.id ? UA.navy : "white", color: activeTab === t.id ? "white" : UA.textMuted, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* D2L IMPORT TAB */}
      {activeTab === "d2l" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <div style={{ padding: "16px 20px", borderRadius: UA.radius, background: UA.navyLight, border: `1.5px solid ${UA.navyBorder}` }}>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.navy, marginBottom: 4 }}>🔗 Import from D2L Calendar</div>
            <div style={{ fontSize: 13, color: UA.textMuted, marginBottom: 14, lineHeight: 1.6 }}>

}


function WorkModePage({ assignment: a, onBack, onSessionSaved }) {
  const [time, setTime] = useState(0);
  const [timerOn, setTimerOn] = useState(false);
  const [effort, setEffort] = useState(3);
  const [understanding, setUnderstanding] = useState(3);
  const [notes, setNotes] = useState("");
  const [completionType, setCompletionType] = useState("in_progress");
  const [saved, setSaved] = useState(false);
  const [activePrompt, setActivePrompt] = useState(null);
  const [promptResponses, setPromptResponses] = useState({});
  const [expandedBreakdown, setExpandedBreakdown] = useState({});
  const [isLoadingBreakdown, setIsLoadingBreakdown] = useState({});
  // CHANGED: Added aiBreakdownText to store real AI responses keyed by promptId
  const [aiBreakdownText, setAiBreakdownText] = useState({});
  const timerRef = useRef(null);

  useEffect(() => {
    if (timerOn) timerRef.current = setInterval(() => setTime(p=>p+1), 1000);
    else clearInterval(timerRef.current);
    return () => clearInterval(timerRef.current);
  }, [timerOn]);

  const fmt = s => `${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;

  // CHANGED: Removed direct Anthropic API call from frontend.
  // Now calls /api/ai-breakdown on the backend which holds the API key securely.
  // Frontend only sends assignment data and the selected prompt — no API key ever touches the browser.
  const handleBreakdown = async (promptId) => {
    const prompt = GUIDED_PROMPTS.find(p => p.id === promptId);
    if (!prompt) return;

    setIsLoadingBreakdown(p => ({ ...p, [promptId]: true }));

    try {
      const response = await fetch("/api/ai-breakdown", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          // Assignment context
          assignment: {
            title: a.title,
            course: a.course,
            courseCode: a.courseCode || "",
            dueDate: a.dueDate ? a.dueDate.toLocaleDateString("en-US", { month: "long", day: "numeric", year: "numeric" }) : "",
            points: a.points || "",
            description: a.description || "",
            instructions: a.instructions || "",
            rubric: a.rubric || "",
          },
          // The specific guided prompt being expanded
          prompt: {
            id: prompt.id,
            question: prompt.question,
            aiPrompt: prompt.aiPrompt,
          },
        }),
      });

      const data = await response.json();

      if (data?.text) {
        setAiBreakdownText(p => ({ ...p, [promptId]: data.text }));
      } else {
        // Fallback if backend returns empty
        setAiBreakdownText(p => ({ ...p, [promptId]: "I wasn't able to generate guidance right now. Re-read the instructions carefully and note the key action words — then bring your questions to your learning specialist." }));
      }
    } catch (err) {
      // Fallback if backend call fails entirely
      setAiBreakdownText(p => ({ ...p, [promptId]: "Guidance is unavailable right now. In the meantime, re-read the assignment instructions slowly and write down anything that's unclear to discuss with your learning specialist." }));
    }

    setIsLoadingBreakdown(p => ({ ...p, [promptId]: false }));
    setExpandedBreakdown(p => ({ ...p, [promptId]: true }));
  };

  if (saved) return (
    <div style={{ height: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: UA.bg }}>
      <Card style={{ textAlign: "center", padding: "52px 64px", maxWidth: 420 }}>
        <div style={{ width: 64, height: 64, borderRadius: "50%", background: UA.greenBg, border: `2px solid ${UA.greenBorder}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, margin: "0 auto 20px" }}>✅</div>
        <div style={{ fontWeight: 900, fontSize: 22, color: UA.text, marginBottom: 8 }}>Session Saved!</div>
        <div style={{ color: UA.textMuted, fontSize: 14, marginBottom: 28, lineHeight: 1.6 }}>Great work. Your session has been logged and your learning specialist can see your progress.</div>
        <Btn onClick={onBack} fullWidth>← Back to Assignments</Btn>
      </Card>
    </div>
  );

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", background: UA.bg, fontFamily: "'DM Sans', system-ui, sans-serif" }}>
      {/* Header */}
      <div style={{ background: UA.bgCard, borderBottom: `1px solid ${UA.border}`, padding: "0 28px", height: 60, display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: a.urgency === "red" ? UA.red : a.urgency === "yellow" ? UA.yellow : UA.green }} />
          <div>
            <div style={{ fontWeight: 800, fontSize: 16, color: UA.text }}>{a.title}</div>
            <div style={{ fontSize: 12, color: UA.textMuted }}>{a.course} · {a.points} pts · Due {a.dueDate.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <a href={a.d2lLink} target="_blank" rel="noreferrer" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "7px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.navyBorder}`, background: UA.navyLight, color: UA.navy, fontSize: 13, fontWeight: 700, textDecoration: "none", transition: "all 0.15s" }}

          <Btn variant="outline" size="sm" onClick={() => { setTimerOn(false); onBack(); }}>✕ Close</Btn>

      </div>

      {/* Split panel — stacks vertically on mobile via .work-split CSS class */}

              <div key={label} style={{ marginBottom: 14 }}>

    </div>
  );
}

// Weekly schedule view — shows today's appointments prominently,
// full week below, and caseload health summary at a glance.
function StaffDashboard({ onSelectStudent }) {
  const DAYS = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"];
  const today = new Date();
  // 0=Sun,1=Mon...6=Sat — map to our 1-5 day index
  const todayIdx = today.getDay() === 0 ? 6 : today.getDay(); // 1=Mon..5=Fri

  // Build schedule: for each student, for each slot, create appointment object
  const allAppts = [];
  STUDENTS.forEach(s => {
    (s.schedule || []).forEach(slot => {
      allAppts.push({ student: s, day: slot.day, time: slot.time, room: slot.room });
    });
  });

  // Sort by time
  const sortByTime = (a, b) => {
    const toMins = t => {
      const [time, ampm] = t.split(" ");
      let [h, m] = time.split(":").map(Number);
      if (ampm === "PM" && h !== 12) h += 12;
      if (ampm === "AM" && h === 12) h = 0;
      return h * 60 + m;
    };
    return toMins(a.time) - toMins(b.time);
  };

  const todayAppts = allAppts.filter(a => a.day === todayIdx).sort(sortByTime);
  const isWeekend = todayIdx > 5;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <h1 style={{ fontSize: 26, fontWeight: 900, color: UA.text, margin: 0, letterSpacing: "-0.02em" }}>
            Good morning, Dr. Martinez 👋

function RosterPage({ onSelectStudent }) {
  const [search, setSearch] = useState("");
  const [filterRisk, setFilterRisk] = useState("all");
  const [deletedIds, setDeletedIds] = useState([]);

  const handleDeleteStudent = async (e, studentId) => {
    e.stopPropagation();
    if (!window.confirm("Remove this student from your roster?")) return;
    // Remove from Supabase if real UUID
    if (studentId && typeof studentId === "string" && studentId.includes("-")) {
      await supabase.from("students").delete().eq("students", studentId);
    }
    // Remove from local STUDENTS array and track deleted
    const idx = STUDENTS.findIndex(s => s.id === studentId);
    if (idx !== -1) STUDENTS.splice(idx, 1);
    setDeletedIds(prev => [...prev, studentId]);
  };

  const filtered = STUDENTS.filter(s =>
    !deletedIds.includes(s.id) &&
    (s.name + s.sport).toLowerCase().includes(search.toLowerCase()) &&
    (filterRisk === "all" || s.dynamicRisk === filterRisk)
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <SectionTitle sub="Your full student caseload — click a student to view their profile">Student Roster</SectionTitle>

      {/* Summary cards */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
        {[
          { label: "Total Students", value: STUDENTS.length, color: UA.navy, icon: "👥" },
          { label: "High Risk", value: STUDENTS.filter(s=>s.dynamicRisk==="high").length, color: UA.red, icon: "🔴" },
          { label: "Medium Risk", value: STUDENTS.filter(s=>s.dynamicRisk==="medium").length, color: UA.yellow, icon: "🟡" },
          { label: "On Track", value: STUDENTS.filter(s=>s.dynamicRisk==="low").length, color: UA.green, icon: "🟢" },
        ].map((s,i) => (
          <Card key={i} style={{ padding: "18px 20px" }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 11, color: UA.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>{s.label}</div>
                <div style={{ fontSize: 32, fontWeight: 900, color: s.color }}>{s.value}</div>
              </div>
              <span style={{ fontSize: 24 }}>{s.icon}</span>
            </div>
          </Card>
        ))}
      </div>

      <Card style={{ padding: "14px 20px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 12 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search students or sport..." style={{ padding: "9px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", background: UA.bg }} />

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

// ADDED: Fast inline assignment entry — type multiple assignments rapidly
// without opening a modal for each one. Replaces the Teamworks free-text workflow
// where staff typed all assignments into one description box.
function QuickAddAssignments({ courses, onAdd }) {
  const [rows, setRows] = useState([{ title: "", courseCode: "", dueDate: "", points: "" }]);
  const [saved, setSaved] = useState(false);

  const updateRow = (i, k, v) => setRows(prev => prev.map((r, idx) => idx === i ? { ...r, [k]: v } : r));
  const addRow = () => setRows(prev => [...prev, { title: "", courseCode: "", dueDate: "", points: "" }]);
  const removeRow = (i) => setRows(prev => prev.filter((_, idx) => idx !== i));

  const handleSave = () => {
    const valid = rows.filter(r => r.title.trim() && r.dueDate);
    if (!valid.length) return;
    valid.forEach(r => {
      const days = (new Date(r.dueDate) - Date.now()) / 86400000;
      const urgency = days < 3 ? "red" : days < 7 ? "yellow" : "green";
      const course = courses?.find(c => c.code === r.courseCode);
      onAdd({
        id: Date.now() + Math.random(),
        title: r.title,
        course: course?.name || r.courseCode || "Other",
        courseCode: r.courseCode,
        dueDate: new Date(r.dueDate),
        points: parseInt(r.points) || 0,
        status: "not_started",
        urgency,
        description: "", instructions: "", rubric: "", d2lLink: "",
      });
    });
    setRows([{ title: "", courseCode: "", dueDate: "", points: "" }]);
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  return (
    <Card>
      <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 4 }}>⚡ Quick Add Assignments</div>
      <div style={{ fontSize: 12, color: UA.textMuted, marginBottom: 14 }}>Add multiple assignments fast — one row per assignment</div>
      {/* Column headers */}
      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px 32px", gap: 8, marginBottom: 6 }}>
        {["Assignment Title", "Course", "Due Date", "Points", ""].map((h, i) => (
          <div key={i} style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, textTransform: "uppercase", letterSpacing: "0.04em" }}>{h}</div>
        ))}
      </div>
      {rows.map((row, i) => (
        <div key={i} style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr 80px 32px", gap: 8, marginBottom: 8 }}>
          <input value={row.title} onChange={e => updateRow(i, "title", e.target.value)} placeholder="Assignment title..."
            style={{ padding: "8px 10px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none" }}
            onFocus={e => e.target.style.borderColor = UA.navy} onBlur={e => e.target.style.borderColor = UA.border} />
          <select value={row.courseCode} onChange={e => updateRow(i, "courseCode", e.target.value)}
            style={{ padding: "8px 10px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", background: "white" }}>
            <option value="">Course...</option>
            {(courses || []).map(c => <option key={c.code} value={c.code}>{c.code}</option>)}
          </select>
          <input type="date" value={row.dueDate} onChange={e => updateRow(i, "dueDate", e.target.value)}
            style={{ padding: "8px 10px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none" }} />
          <input type="number" value={row.points} onChange={e => updateRow(i, "points", e.target.value)} placeholder="pts"
            style={{ padding: "8px 10px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none" }} />
          <button onClick={() => removeRow(i)} disabled={rows.length === 1}
            style={{ padding: "8px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, background: "white", cursor: rows.length === 1 ? "not-allowed" : "pointer", color: UA.textMuted, fontSize: 14, opacity: rows.length === 1 ? 0.3 : 1 }}>✕</button>
        </div>
      ))}
      <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
        <Btn variant="ghost" size="sm" onClick={addRow}>+ Add Row</Btn>
        <Btn size="sm" onClick={handleSave}>Save All</Btn>
        {saved && <span style={{ fontSize: 13, color: UA.green, fontWeight: 700, alignSelf: "center" }}>✓ Assignments added</span>}
      </div>
    </Card>
  );
}

          <div style={{ marginTop: 14, display: "flex", flexWrap: "wrap", gap: 6 }}>
            {student.courses.map(c => (
              <span key={c.code} style={{ fontSize: 12, padding: "4px 12px", borderRadius: 99, background: UA.navyLight, color: UA.navy, fontWeight: 700, border: `1px solid ${UA.navyBorder}` }}>
                {c.code} <span style={{ fontWeight: 400, opacity: 0.7 }}>· {c.name} · {c.credits}cr</span>
              </span>
            ))}
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 4, borderBottom: `1px solid ${UA.border}`, paddingBottom: 0 }}>
        {tabs.map(tab => (
          <button key={tab.id} onClick={() => setActiveTab(tab.id)}
            style={{ padding: "10px 18px", border: "none", background: "none", cursor: "pointer", fontFamily: "inherit", fontSize: 14, fontWeight: activeTab === tab.id ? 800 : 500, color: activeTab === tab.id ? UA.red : UA.textMuted, borderBottom: activeTab === tab.id ? `2.5px solid ${UA.red}` : "2.5px solid transparent", transition: "all 0.15s", display: "flex", alignItems: "center", gap: 6, marginBottom: -1 }}>
            {tab.label}
            {tab.count !== undefined && <span style={{ fontSize: 11, padding: "1px 7px", borderRadius: 99, background: UA.redLight, color: UA.red, fontWeight: 700 }}>{tab.count}</span>}
            {tab.staffOnly && <span style={{ fontSize: 9, padding: "2px 5px", borderRadius: 4, background: `${UA.red}22`, color: UA.red, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase" }}>Staff</span>}
          </button>
        ))}
      </div>

      {/* Tab content */}
      {activeTab === "overview" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {/* ADDED: Weekly session plan — replaces Teamworks free-text task field */}
          <Card style={{ border: `1.5px solid ${UA.navyBorder}`, background: UA.navyLight }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div style={{ fontWeight: 800, fontSize: 14, color: UA.navy }}>📋 This Week's Plan</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                {planSaved && <span style={{ fontSize: 12, color: UA.green, fontWeight: 700 }}>✓ Saved</span>}
                <Btn size="sm" variant="navy" onClick={handlePlanSave}>Save Plan</Btn>
              </div>
            </div>
            <textarea value={weeklyPlan} onChange={e => setWeeklyPlan(e.target.value)} rows={5}
              placeholder="Monday: ...&#10;Tuesday: ...&#10;Wednesday: session time&#10;Thursday: ...&#10;Friday: ..."
              style={{ width: "100%", padding: "10px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.navyBorder}`, fontSize: 13, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box", lineHeight: 1.7, background: "white" }} />
          </Card>
          {/* Metrics */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
            {[
              { label: "Avg Effort", value: `${student.avgEffort}/5`, color: student.avgEffort >= 3.5 ? UA.green : UA.red },
              { label: "Avg Understanding", value: `${student.avgUnderstanding}/5`, color: student.avgUnderstanding >= 3 ? UA.green : UA.red },
              { label: "Study Hours", value: `${student.totalHours}h`, color: UA.navy },
              { label: "Missing", value: student.missedAssignments, color: student.missedAssignments > 0 ? UA.red : UA.green },
            ].map((s,i) => (
              <Card key={i} style={{ padding: "18px 20px", textAlign: "center" }}>
                <div style={{ fontSize: 11, color: UA.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>{s.label}</div>
                <div style={{ fontSize: 28, fontWeight: 900, color: s.color }}>{s.value}</div>
              </Card>
            ))}
          </div>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 14 }}>Effort & Understanding Trend</div>
            <ResponsiveContainer width="100%" height={200}>
              <LineChart data={EFFORT_TREND}>
                <CartesianGrid strokeDasharray="3 3" stroke={UA.border} />
                <XAxis dataKey="week" tick={{ fontSize: 12, fill: UA.textMuted }} axisLine={false} tickLine={false} />
                <YAxis domain={[0,5]} tick={{ fontSize: 12, fill: UA.textMuted }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ borderRadius: UA.radiusSm, border: `1px solid ${UA.border}` }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Line type="monotone" dataKey="effort" stroke={UA.red} strokeWidth={2.5} dot={{ r: 4 }} name="Effort" />
                <Line type="monotone" dataKey="understanding" stroke={UA.navy} strokeWidth={2.5} dot={{ r: 4 }} name="Understanding" />
              </LineChart>
            </ResponsiveContainer>
          </Card>
        </div>
      )}

      {activeTab === "assignments" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {/* ADDED: Quick add inline row entry */}
          <QuickAddAssignments
            courses={student.courses}
            onAdd={a => setLocalAssignments(prev => [...prev, a])}
          />
          {/* ADDED: Course filter pills */}
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Filter by Course</div>
            <CourseList courses={student.courses} selectedCourse={selectedCourse} onSelect={setSelectedCourse} />
          </div>
          {/* Assignment list filtered by course */}
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {localAssignments
              .filter(a => selectedCourse === "all" || a.courseCode === selectedCourse)
              .map(a => (
                <div key={a.id} style={{ background: UA.bgCard, border: `1px solid ${UA.border}`, borderRadius: UA.radius, padding: "14px 18px", display: "flex", alignItems: "center", gap: 14, boxShadow: UA.shadow }}>
                  <UrgencyBar urgency={a.urgency} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, color: UA.text }}>{a.title}</div>
                    <div style={{ fontSize: 12, color: UA.textMuted, marginTop: 2 }}>{a.course} · {a.courseCode} · Due {a.dueDate.toLocaleDateString("en-US", { month: "short", day: "numeric" })}</div>
                  </div>
                  <StatusBadge status={a.status} />
                </div>
              ))}
            {localAssignments.filter(a => selectedCourse === "all" || a.courseCode === selectedCourse).length === 0 && (
              <div style={{ textAlign: "center", padding: "32px 0", color: UA.textMuted, fontSize: 14 }}>No assignments for this course</div>
            )}
          </div>
        </div>
      )}

      {activeTab === "sessions" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ fontWeight: 800, fontSize: 15, color: UA.text }}>Work Session Log</div>
          <div style={{ fontSize: 13, color: UA.textMuted, lineHeight: 1.6 }}>Every Work Mode session this student has logged — review before your meeting to see where they spent time, how they rated their effort and understanding, and what they noted.</div>
          <SessionLogTab studentId={student.id} />
        </div>
      )}

      {activeTab === "risk" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Card>
              <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 12 }}>Intake Risk Assessment</div>
              <RiskBadge level={student.intakeRisk} />
              <p style={{ fontSize: 13, color: UA.textSecondary, lineHeight: 1.7, marginTop: 10 }}>Set at semester intake based on academic history, standardized test scores, and self-reported learning needs.</p>
            </Card>
            <Card>
              <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 12 }}>Current Dynamic Risk</div>
              <RiskBadge level={student.dynamicRisk} score={student.riskScore} />
              <p style={{ fontSize: 13, color: UA.textSecondary, lineHeight: 1.7, marginTop: 10 }}>Auto-calculated from assignment completion, session frequency, effort ratings, and understanding scores.</p>
            </Card>
          </div>
          <Card style={{ background: UA.redLight, border: `1px solid ${UA.redBorder}` }}>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.red, marginBottom: 12 }}>⚠️ Active Risk Factors</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {[
                { label: `${student.missedAssignments} missing assignments`, active: student.missedAssignments > 0 },
                { label: `Last session ${student.lastSession}`, active: student.lastSession.includes("5") || student.lastSession.includes("6") },
                { label: `Avg understanding below 3.0`, active: student.avgUnderstanding < 3 },
                { label: `Avg effort below 3.0`, active: student.avgEffort < 3 },
              ].filter(f=>f.active).map((f,i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13, color: UA.redDark }}>
                  <span style={{ width: 20, height: 20, borderRadius: "50%", background: UA.red, color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, flexShrink: 0 }}>!</span>
                  {f.label}
                </div>
              ))}
            </div>
          </Card>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 12 }}>Recommended Interventions</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {["Schedule additional LS session this week", "Tutoring referral for lowest-rated course", "Outreach to student via email", "Notify academic advisor"].map((item, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: UA.radiusSm, background: UA.bg, border: `1px solid ${UA.border}`, fontSize: 13, color: UA.text }}>
                  <input type="checkbox" style={{ accentColor: UA.red, width: 15, height: 15, cursor: "pointer" }} />
                  {item}
                </div>
              ))}
            </div>
          </Card>
        </div>
      )}

      {activeTab === "notes" && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          {/* Add note */}
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 14 }}>Add Note</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto", gap: 12, marginBottom: 12 }}>
              <select value={noteCategory} onChange={e=>setNoteCategory(e.target.value)} style={{ padding: "9px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", background: "white" }}>
                <option>Session Note</option>
                <option>Concern Flag</option>
                <option>Follow-Up Required</option>
                <option>Intake Observation</option>
              </select>
              <Btn onClick={handleAddNote} disabled={!newNote.trim()}>+ Add Note</Btn>
            </div>
            <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Document session observations, concerns, follow-up actions, or intake notes..." rows={4}
              style={{ width: "100%", padding: "12px 14px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", resize: "none", outline: "none", boxSizing: "border-box", lineHeight: 1.6 }}
              onFocus={e=>e.target.style.borderColor=UA.navy} onBlur={e=>e.target.style.borderColor=UA.border} />
            {noteSaved && <div style={{ marginTop: 10, fontSize: 13, color: UA.green, fontWeight: 600 }}>✓ Note added successfully</div>}
          </Card>
          {/* Existing notes */}
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {notes.map(note => <NoteCard key={note.id} note={note} />)}
            {notes.length === 0 && <div style={{ textAlign: "center", padding: "40px 0", color: UA.textMuted, fontSize: 14 }}>No notes yet for this student</div>}
          </div>
        </div>
      )}

      {activeTab === "documents" && (
        <StaffDocumentsView studentId={student.id} studentName={student.name} onAddAssignment={onAddAssignment} sessionUser={sessionUser} />
      )}
    </div>
  );
}
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;
const { BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;
// --- STAFF DOCUMENTS VIEW -----------------------------------------------------
// Shows on student profile Documents tab — staff can see everything the student uploaded
function StaffDocumentsView({ studentId, studentName, onAddAssignment, sessionUser }) {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  const student = STUDENTS.find(s => s.id === studentId) || { name: studentName };

  useEffect(() => {
    fetchDocumentsForStudent(studentId).then(d => {
      setDocs(d || []);
      setLoading(false);
    });
  }, [studentId]);

  if (loading) return <div style={{ textAlign: "center", padding: "32px 0", color: UA.textMuted, fontSize: 14 }}>Loading documents...</div>;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div>
        <div style={{ fontWeight: 800, fontSize: 15, color: UA.text }}>Documents</div>
        <div style={{ fontSize: 13, color: UA.textMuted, marginTop: 2 }}>Syllabi and course documents for {studentName.split(" ")[0]}. Use View / Add Assignments to add extracted tasks to their list.</div>
      </div>
      <SavedDocsTab
        docs={docs}
        setDocs={setDocs}
        student={student}
        onAddAssignment={onAddAssignment}
        effectiveStudentId={studentId}
        sessionUser={sessionUser}
        isStudent={false}
      />
    </div>
  );
}

// --- ANALYTICS PAGE -----------------------------------------------------------
// Student view: personal assignment and effort progress
// Staff view: caseload-level clinical analytics
function AnalyticsPage({ role, assignments = ASSIGNMENTS }) {

  // -- STUDENT VIEW ---------------------------------------------------------
  if (role === "student") {
    const statusData = [
      { name: "Completed", value: assignments.filter(a=>a.status==="completed").length, fill: UA.green },
      { name: "In Progress", value: assignments.filter(a=>a.status==="in_progress").length, fill: UA.navy },
      { name: "Not Started", value: assignments.filter(a=>a.status==="not_started").length, fill: "#9CA3AF" },
      { name: "Missing", value: assignments.filter(a=>a.status==="missing").length, fill: UA.red },
    ];
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
        <SectionTitle sub="Your personal progress this semester">My Progress</SectionTitle>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
          {[
            { label: "Completion Rate", value: "67%", color: UA.navy, icon: "📈" },
            { label: "Total Tasks", value: assignments.length, color: UA.text, icon: "📋" },
            { label: "Urgent", value: assignments.filter(a=>a.urgency==="red").length, color: UA.red, icon: "🔴" },
            { label: "Missing", value: assignments.filter(a=>a.status==="missing").length, color: UA.orange, icon: "⚠️" },
          ].map((s,i)=>(
            <Card key={i} style={{ padding: "18px 20px" }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <div>
                  <div style={{ fontSize: 11, color: UA.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>{s.label}</div>
                  <div style={{ fontSize: 32, fontWeight: 900, color: s.color }}>{s.value}</div>
                </div>
                <span style={{ fontSize: 24 }}>{s.icon}</span>
              </div>
            </Card>
          ))}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 4 }}>Assignment Status</div>
            <div style={{ fontSize: 12, color: UA.textMuted, marginBottom: 16 }}>Distribution by status</div>
            <ResponsiveContainer width="100%" height={220}>
              <PieChart><Pie data={statusData} cx="50%" cy="50%" outerRadius={80} dataKey="value" label={({name,value})=>value>0?`${name}: ${value}`:""}>
                {statusData.map((e,i)=><Cell key={i} fill={e.fill}/>)}
              </Pie><Tooltip /></PieChart>
            </ResponsiveContainer>
          </Card>
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 4 }}>Effort & Understanding</div>
            <div style={{ fontSize: 12, color: UA.textMuted, marginBottom: 16 }}>Weekly trend (out of 5)</div>
            <ResponsiveContainer width="100%" height={220}>
              <LineChart data={EFFORT_TREND}>
                <CartesianGrid strokeDasharray="3 3" stroke={UA.border} />
                <XAxis dataKey="week" tick={{ fontSize: 11, fill: UA.textMuted }} axisLine={false} tickLine={false} />
                <YAxis domain={[0,5]} tick={{ fontSize: 11, fill: UA.textMuted }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ borderRadius: UA.radiusSm, border: `1px solid ${UA.border}` }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Line type="monotone" dataKey="effort" stroke={UA.red} strokeWidth={2.5} dot={{ r: 4 }} name="Effort" />
                <Line type="monotone" dataKey="understanding" stroke={UA.navy} strokeWidth={2.5} dot={{ r: 4 }} name="Understanding" />
              </LineChart>
            </ResponsiveContainer>
          </Card>
        </div>
      </div>
    );
  }

  // -- STAFF / CASELOAD VIEW ------------------------------------------------
  // Students who haven't logged a session recently
  const needsAttention = STUDENTS.filter(s => s.lastSession.includes("3 days") || s.lastSession.includes("4 days") || s.lastSession.includes("5 days") || s.lastSession.includes("6 days") || s.lastSession === "TBD - awaiting response");

  // Missing assignments by course across caseload
  const missingByCourse = {};
  ASSIGNMENTS.filter(a => a.status === "missing").forEach(a => {
    missingByCourse[a.course] = (missingByCourse[a.course] || 0) + 1;
  });
  const courseData = Object.entries(missingByCourse).map(([course, count]) => ({ course: course.split(" ").slice(0,2).join(" "), count })).sort((a,b) => b.count - a.count);

  // Effort by risk level
  const riskEffort = [
    { risk: "High Risk", effort: +(STUDENTS.filter(s=>s.dynamicRisk==="high").reduce((s,st)=>s+st.avgEffort,0)/Math.max(1,STUDENTS.filter(s=>s.dynamicRisk==="high").length)).toFixed(1), understanding: +(STUDENTS.filter(s=>s.dynamicRisk==="high").reduce((s,st)=>s+st.avgUnderstanding,0)/Math.max(1,STUDENTS.filter(s=>s.dynamicRisk==="high").length)).toFixed(1) },
    { risk: "Med Risk", effort: +(STUDENTS.filter(s=>s.dynamicRisk==="medium").reduce((s,st)=>s+st.avgEffort,0)/Math.max(1,STUDENTS.filter(s=>s.dynamicRisk==="medium").length)).toFixed(1), understanding: +(STUDENTS.filter(s=>s.dynamicRisk==="medium").reduce((s,st)=>s+st.avgUnderstanding,0)/Math.max(1,STUDENTS.filter(s=>s.dynamicRisk==="medium").length)).toFixed(1) },
    { risk: "Low Risk", effort: +(STUDENTS.filter(s=>s.dynamicRisk==="low").reduce((s,st)=>s+st.avgEffort,0)/Math.max(1,STUDENTS.filter(s=>s.dynamicRisk==="low").length)).toFixed(1), understanding: +(STUDENTS.filter(s=>s.dynamicRisk==="low").reduce((s,st)=>s+st.avgUnderstanding,0)/Math.max(1,STUDENTS.filter(s=>s.dynamicRisk==="low").length)).toFixed(1) },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <SectionTitle sub="Caseload-level trends and intervention signals">Caseload Analytics</SectionTitle>
        <Btn variant="secondary">📄 Export Weekly Report</Btn>
      </div>

      {/* Summary stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
        {[
          { label: "Avg Caseload Effort", value: (STUDENTS.reduce((s,st)=>s+st.avgEffort,0)/STUDENTS.length).toFixed(1)+"/5", color: UA.navy, icon: "💪" },
          { label: "Avg Understanding", value: (STUDENTS.reduce((s,st)=>s+st.avgUnderstanding,0)/STUDENTS.length).toFixed(1)+"/5", color: UA.navy, icon: "🧠" },
          { label: "Total Missing", value: STUDENTS.reduce((s,st)=>s+st.missedAssignments,0), color: UA.red, icon: "⚠️" },
          { label: "Total Study Hours", value: STUDENTS.reduce((s,st)=>s+st.totalHours,0)+"h", color: UA.green, icon: "⏱" },
        ].map((s,i)=>(
          <Card key={i} style={{ padding: "18px 20px" }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 11, color: UA.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>{s.label}</div>
                <div style={{ fontSize: 28, fontWeight: 900, color: s.color }}>{s.value}</div>
              </div>
              <span style={{ fontSize: 24 }}>{s.icon}</span>
            </div>
          </Card>
        ))}
      </div>

      {/* Needs attention */}
      {needsAttention.length > 0 && (
        <Card style={{ border: `1.5px solid ${UA.redBorder}`, background: UA.redLight }}>
          <div style={{ fontWeight: 800, fontSize: 14, color: UA.red, marginBottom: 12 }}>⚠️ Students with no recent session</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {needsAttention.map(s => (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: UA.radiusSm, background: "white", border: `1px solid ${UA.redBorder}` }}>
                <Avatar initials={s.initials} size={32} color={UA.red} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: UA.text }}>{s.name}</div>
                  <div style={{ fontSize: 12, color: UA.textMuted }}>{s.sport} · Last session: {s.lastSession}</div>
                </div>
                <RiskBadge level={s.dynamicRisk} />
              </div>
            ))}
          </div>
        </Card>
      )}

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 18 }}>
        {/* Missing assignments by course */}
        <Card>
          <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 4 }}>Missing Assignments by Course</div>
          <div style={{ fontSize: 12, color: UA.textMuted, marginBottom: 16 }}>Across entire caseload</div>
          {courseData.length === 0 ? <div style={{ color: UA.textMuted, fontSize: 13 }}>No missing assignments</div> : (
            <ResponsiveContainer width="100%" height={200}>
              <BarChart data={courseData} layout="vertical" margin={{ left: 10 }}>
                <CartesianGrid strokeDasharray="3 3" stroke={UA.border} horizontal={false} />
                <XAxis type="number" tick={{ fontSize: 11, fill: UA.textMuted }} axisLine={false} tickLine={false} allowDecimals={false} />
                <YAxis type="category" dataKey="course" tick={{ fontSize: 11, fill: UA.textMuted }} axisLine={false} tickLine={false} width={80} />
                <Tooltip contentStyle={{ borderRadius: UA.radiusSm, border: `1px solid ${UA.border}` }} />
                <Bar dataKey="count" fill={UA.red} radius={[0, 4, 4, 0]} name="Missing" />
              </BarChart>
            </ResponsiveContainer>
          )}
        </Card>

        {/* Effort & understanding by risk level */}
        <Card>
          <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 4 }}>Effort & Understanding by Risk Level</div>
          <div style={{ fontSize: 12, color: UA.textMuted, marginBottom: 16 }}>Average across each risk group</div>
          <ResponsiveContainer width="100%" height={200}>
            <BarChart data={riskEffort}>
              <CartesianGrid strokeDasharray="3 3" stroke={UA.border} />
              <XAxis dataKey="risk" tick={{ fontSize: 11, fill: UA.textMuted }} axisLine={false} tickLine={false} />

    highRisk: true, missedSession: true, missingAssignment: true,
    lowUnderstanding: true, sessionComplete: false, weeklyReport: true,

    if (!newStudent.name.trim() || !newStudent.sport.trim()) return;

    setCaseload(prev => [...prev, student]);

  return (

  const handleAddStaff = () => {
    if (!newStaff.name.trim()) return;
    const initials = newStaff.name.split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2);

    setShowAddStaff(false);
    setStaffSaved(true);
    setTimeout(() => setStaffSaved(false), 2500);
  };

  const handleAddStudent = () => {
    if (!newStudent.name.trim() || !newStudent.sport.trim()) return;
    const initials = newStudent.name.split(" ").map(n=>n[0]).join("").toUpperCase().slice(0,2);
    const s = {
      id: Date.now(), name: newStudent.name, email: newStudent.email,
      sport: newStudent.sport, initials, year: newStudent.year,
      gpa: 0, intakeRisk: "medium", dynamicRisk: "medium", riskScore: 50,
      lastSession: "Not yet", missedAssignments: 0, avgEffort: 0,
      avgUnderstanding: 0, totalHours: 0,
      counselor: newStudent.counselor || staff.find(st=>st.id===Number(newStudent.assignedStaffId))?.name || "TBD",
      courses: [], weeklyPlan: "", nextSession: "Not scheduled", schedule: [],
    };
    setAllStudents(prev => [...prev, s]);
    // Assign to staff if selected
    if (newStudent.assignedStaffId) {
      setStaff(prev => prev.map(st => st.id === Number(newStudent.assignedStaffId) ? { ...st, students: [...st.students, s.id] } : st));

    setStudentSaved(true);
    setTimeout(() => setStudentSaved(false), 2500);

  const handleReassign = (studentId, newStaffId) => {
    setStaff(prev => prev.map(st => ({
      ...st,
      students: st.id === Number(newStaffId)
