// Reusable component used in Entry Hub Saved tab and Student Profile Documents tab.
// Supports extract, add assignments with checkboxes, and delete per document.
function SavedDocsTab({ docs, setDocs, student, onAddAssignment, effectiveStudentId, sessionUser, isStudent }) {
  const [expandedDoc, setExpandedDoc] = useState(null);
  const [docState, setDocState] = useState({}); // per doc: { items, selected, added, extracting, showPaste, pasteText }

  const isRealUUID = (id) => id && typeof id === "string" && id.includes("-");

  const getDocState = (docId) => docState[docId] || { items: [], selected: {}, added: false, extracting: false, showPaste: false, pasteText: "" };
  const setDs = (docId, patch) => setDocState(prev => ({ ...prev, [docId]: { ...getDocState(docId), ...patch } }));

  const handleDelete = async (docId) => {
    if (!window.confirm("Delete this document?")) return;
    if (isRealUUID(docId)) await supabase.from("documents").delete().eq("id", docId);
    setDocs(prev => prev.filter(d => d.id !== docId));
    if (expandedDoc === docId) setExpandedDoc(null);
  };

  const localExtract = (text, courseCode) => {
    const found = [];
    const seen = new Set();
    const datePattern = /(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\.?\s+\d{1,2}(?:,?\s*\d{4})?|\d{1,2}\/\d{1,2}(?:\/\d{2,4})?/gi;
    const typeMap = { exam:"Exam",test:"Exam",midterm:"Exam",final:"Exam",quiz:"Quiz",essay:"Essay",paper:"Essay",report:"Essay",project:"Project",presentation:"Project",homework:"Homework",assignment:"Homework",discussion:"Homework",lab:"Homework",reading:"Homework" };
    const lines = text.split("\n");
    for (const line of lines) {
      const trimmed = line.trim();
      if (trimmed.length < 5 || trimmed.length > 200) continue;
      const dateMatch = trimmed.match(datePattern);
      if (!dateMatch) continue;
      let dueDate = null;
      try {
        const raw = dateMatch[0];
        const parsed = new Date(raw.includes("/") ? raw : raw + (raw.match(/\d{4}/) ? "" : ", 2026"));
        if (!isNaN(parsed.getTime()) && parsed.getFullYear() >= 2024) dueDate = parsed.toISOString().split("T")[0];
      } catch(e) { continue; }
      if (!dueDate) continue;
      let title = trimmed.replace(dateMatch[0], "").replace(/[:\-–—|]+/g, " ").replace(/\s+/g, " ").trim().replace(/^[,.\s]+|[,.\s]+$/g, "");
      if (!title || title.length < 3 || seen.has(title.toLowerCase())) continue;
      seen.add(title.toLowerCase());
      const lower = title.toLowerCase();
      let type = "Homework";
      for (const [kw, t] of Object.entries(typeMap)) { if (lower.includes(kw)) { type = t; break; } }
      const pointsMatch = trimmed.match(/(\d+)\s*(?:pts?|points?)/i);
      const points = pointsMatch ? parseInt(pointsMatch[1]) : (type === "Exam" ? 100 : 25);
      found.push({ title, dueDate, points, type });
      if (found.length >= 20) break;
    }
    return found;
  };

  const handleExtract = (doc) => {
    const ds = getDocState(doc.id);
    const text = ds.pasteText || "";
    if (!text.trim()) { setDs(doc.id, { showPaste: true }); return; }
    setDs(doc.id, { extracting: true });
    setTimeout(() => {
      const found = localExtract(text, doc.course_code);
      const selected = {};
      found.forEach((_, i) => selected[i] = true);
      setDs(doc.id, { items: found, selected, extracting: false, showPaste: false });
    }, 600);
  };

  const handleAddAssignments = async (doc) => {
    const ds = getDocState(doc.id);
    const toAdd = ds.items.filter((_, i) => ds.selected[i]);
    if (!toAdd.length) return;
    for (const a of toAdd) {
      const dueDateObj = a.dueDate instanceof Date ? a.dueDate : new Date(a.dueDate);
      const days = (dueDateObj - Date.now()) / 86400000;
      const urgency = days < 3 ? "red" : days < 7 ? "yellow" : "green";
      const item = {
        id: `doc-${Date.now()}-${Math.random()}`,
        title: a.title, course: doc.course_name || doc.course_code || "Course",
        courseCode: doc.course_code || "", dueDate: dueDateObj,
        points: a.points || 0, urgency, status: "not_started",
        description: "", instructions: "", rubric: "",
        d2lLink: "https://d2l.arizona.edu", studentId: effectiveStudentId,
      };
      if (onAddAssignment) {
        // onAddAssignment handles both state update AND Supabase insert
        await onAddAssignment(item);
      } else if (isRealUUID(effectiveStudentId)) {
        // No callback — insert directly as fallback
        await insertAssignment(item, effectiveStudentId, sessionUser?.id);
      }
    }
    setDs(doc.id, { added: true });
    setTimeout(() => setDs(doc.id, { added: false }), 3000);
  };

  const toggleItem = (docId, i) => {
    const ds = getDocState(docId);
    setDs(docId, { selected: { ...ds.selected, [i]: !ds.selected[i] } });
  };

  const selectAll = (docId, items) => {
    const all = {};
    items.forEach((_, i) => all[i] = true);
    setDs(docId, { selected: all });
  };

  if (docs.length === 0) return (
    <div style={{ textAlign: "center", padding: "48px 0", color: UA.textMuted }}>
      <div style={{ fontSize: 36, marginBottom: 12 }}>📄</div>
      <div style={{ fontSize: 14, fontWeight: 700, color: UA.text, marginBottom: 4 }}>No documents saved yet</div>
      <div style={{ fontSize: 13 }}>Upload a syllabus in the Syllabus tab to get started</div>
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {docs.map(doc => {
        const isExpanded = expandedDoc === doc.id;
        const ds = getDocState(doc.id);
        const storedItems = doc.extracted_assignments || [];
        const displayItems = ds.items.length > 0 ? ds.items : storedItems;
        const selCount = Object.values(ds.selected).filter(Boolean).length;

        return (
          <div key={doc.id} style={{ background: "white", border: `1px solid ${isExpanded ? UA.navy : UA.border}`, borderRadius: UA.radius, overflow: "hidden", transition: "border-color 0.15s" }}>
            {/* Header row */}
            <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "14px 18px" }}>
              <span style={{ fontSize: 26, flexShrink: 0 }}>📄</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: UA.text, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{doc.file_name}</div>
                <div style={{ fontSize: 12, color: UA.textMuted, marginTop: 2 }}>
                  {doc.course_code && `${doc.course_code} · `}
                  {doc.document_type} · {new Date(doc.created_at).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}
                  {storedItems.length > 0 && ` · ${storedItems.length} assignments stored`}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <button onClick={() => setExpandedDoc(isExpanded ? null : doc.id)}
                  style={{ padding: "5px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.navyBorder}`, background: isExpanded ? UA.navy : UA.navyLight, color: isExpanded ? "white" : UA.navy, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>
                  {isExpanded ? "Close" : "Open →"}
                </button>
                <button onClick={() => handleDelete(doc.id)}
                  style={{ padding: "5px 10px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.redBorder}`, background: UA.redLight, color: UA.red, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit" }}>🗑</button>
              </div>
            </div>

            {/* Expanded panel */}
            {isExpanded && (
              <div style={{ borderTop: `1px solid ${UA.border}`, padding: "16px 18px", background: "#F8F9FB" }}>

                {/* Extract section */}
                <div style={{ marginBottom: 16, padding: "12px 16px", borderRadius: UA.radiusSm, background: UA.navyLight, border: `1.5px solid ${UA.navyBorder}` }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: ds.showPaste ? 10 : 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 700, color: UA.navy }}>✨ Extract Assignments from Syllabus</div>
                    <button onClick={() => handleExtract(doc)} disabled={ds.extracting}
                      style={{ padding: "5px 14px", borderRadius: UA.radiusSm, border: "none", background: UA.navy, color: "white", fontSize: 12, fontWeight: 700, cursor: ds.extracting ? "wait" : "pointer", fontFamily: "inherit" }}>
                      {ds.extracting ? "Extracting..." : ds.showPaste ? "Run Extract" : "Extract →"}
                    </button>
                  </div>
                  {!ds.showPaste && !ds.extracting && displayItems.length === 0 && (
                    <div style={{ fontSize: 12, color: UA.textMuted, marginTop: 6 }}>Paste the syllabus text below and click Extract → to pull out assignments and due dates.</div>
                  )}
                  {(ds.showPaste || displayItems.length === 0) && (
                    <textarea value={ds.pasteText} onChange={e => setDs(doc.id, { pasteText: e.target.value, showPaste: true })}
                      placeholder="Paste syllabus text here to extract assignments..."
                      rows={4}
                      style={{ width: "100%", marginTop: 8, padding: "8px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.navyBorder}`, fontSize: 12, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
                  )}
                </div>

                {/* Assignments list */}
                {displayItems.length > 0 && (
                  <>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                      <div style={{ fontWeight: 700, fontSize: 13, color: UA.text }}>{displayItems.length} assignments — select to add</div>
                      <button onClick={() => selectAll(doc.id, displayItems)}
                        style={{ fontSize: 11, fontWeight: 700, color: UA.navy, background: "white", border: `1px solid ${UA.navyBorder}`, borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" }}>Select All</button>
                    </div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 5, marginBottom: 12 }}>
                      {displayItems.map((a, i) => (
                        <div key={i} onClick={() => toggleItem(doc.id, i)}
                          style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: UA.radiusSm, background: ds.selected[i] ? "white" : "rgba(255,255,255,0.5)", border: `1.5px solid ${ds.selected[i] ? UA.navy : UA.border}`, cursor: "pointer", transition: "all 0.1s" }}>
                          <div style={{ width: 17, height: 17, borderRadius: 4, border: `2px solid ${ds.selected[i] ? UA.navy : UA.border}`, background: ds.selected[i] ? UA.navy : "white", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                            {ds.selected[i] && <span style={{ color: "white", fontSize: 10, fontWeight: 900 }}>✓</span>}
                          </div>
                          <div style={{ flex: 1, fontSize: 13 }}>
                            <span style={{ fontWeight: 700, color: UA.text }}>{a.title}</span>
                            <span style={{ color: UA.textMuted }}> · {a.type} · {a.points}pts</span>
                          </div>
                          <span style={{ fontSize: 11, color: UA.textMuted, flexShrink: 0 }}>{new Date(a.dueDate).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                      <button onClick={() => handleAddAssignments(doc)} disabled={selCount === 0}
                        style={{ padding: "9px 18px", borderRadius: UA.radiusSm, border: "none", background: selCount > 0 ? UA.navy : UA.border, color: "white", fontSize: 13, fontWeight: 700, cursor: selCount > 0 ? "pointer" : "not-allowed", fontFamily: "inherit" }}>
                        + Add {selCount > 0 ? `${selCount} ` : ""}Assignment{selCount !== 1 ? "s" : ""} to {student?.name?.split(" ")[0] || "Student"}
                      </button>
                      {ds.added && <span style={{ fontSize: 13, color: UA.green, fontWeight: 700 }}>✓ Added to assignment list</span>}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}


// --- ENTRY HUB PAGE -----------------------------------------------------------
// Assignment entry for staff — manual quick-add, ICS/D2L import, and sync status
// --- ENTRY HUB PAGE -----------------------------------------------------------
// Combined staff and student hub: D2L import, quick add, syllabus upload + extract, saved docs
// role prop determines which sections are visible (student hides quick add)
function EntryHubPage({ onAddAssignment, sessionUser, role = "staff", students = STUDENTS }) {
  const isStudent = role === "student";
  const [activeTab, setActiveTab] = useState("d2l");

  // Resolve real Supabase UUID — mock students have integer IDs, real ones have UUIDs
  const isRealUUID = (id) => id && typeof id === "string" && id.includes("-");

  // Auto-select first real Supabase student (UUID) — fall back to first student
  const firstRealStudent = students.find(s => isRealUUID(s.id));
  const [selectedStudentId, setSelectedStudentId] = useState(firstRealStudent?.id || students[0]?.id);

  // Re-select when students prop updates with real data
  useEffect(() => {
    const real = students.find(s => isRealUUID(s.id));
    if (real && !isRealUUID(selectedStudentId)) {
      setSelectedStudentId(real.id);
    }
  }, [students]);

  // D2L import state
  const [icsUrl, setIcsUrl] = useState("");
  const [importing, setImporting] = useState(false);
  const [icsResult, setIcsResult] = useState(null);

  // Quick add state (staff only)
  const [rows, setRows] = useState([{ title: "", courseCode: "", dueDate: "", points: "" }]);
  const [quickSaved, setQuickSaved] = useState(false);

  // Syllabus state
  const [syllabusFile, setSyllabusFile] = useState("");
  const [syllabusCode, setSyllabusCode] = useState("");
  const [syllabusCourseName, setSyllabusCourseName] = useState("");
  const [syllabusText, setSyllabusText] = useState("");
  const [isDragging, setIsDragging] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [extractedItems, setExtractedItems] = useState([]);
  const [selectedExtracted, setSelectedExtracted] = useState({});
  const [assignmentsAdded, setAssignmentsAdded] = useState(false);
  const [syllabusUploading, setSyllabusUploading] = useState(false);
  const [syllabusSaved, setSyllabusSaved] = useState(false);

  // Saved docs state
  const [docs, setDocs] = useState([]);
  const [docsLoading, setDocsLoading] = useState(true);
  const fileRef = useRef();

  const student = students.find(s => s.id === selectedStudentId) || students[0];

  const effectiveStudentId = isStudent
    ? (STUDENTS.find(s => s.email === sessionUser?.email)?.id || sessionUser?.studentId || null)
    : (isRealUUID(selectedStudentId) ? selectedStudentId : null);

  // For display — show which student is selected and whether they have a real UUID
  const studentHasRealId = isRealUUID(effectiveStudentId);

  useEffect(() => {
    const loadDocs = async () => {
      if (!effectiveStudentId) { setDocsLoading(false); return; }
      const d = await fetchDocumentsForStudent(effectiveStudentId);
      setDocs(d || []);
      setDocsLoading(false);
    };
    loadDocs();
  }, [effectiveStudentId]);

  // D2L import
  const handleD2LImport = async () => {
    if (!icsUrl.trim()) return;
    setImporting(true); setIcsResult(null);
    await new Promise(r => setTimeout(r, 1800));
    const parsed = [
      { title: "ENGL 101 Essay Draft", courseCode: "ENGL101", dueDate: new Date(Date.now() + 3*86400000), points: 100 },
      { title: "MIS 111 Module Quiz", courseCode: "MIS111", dueDate: new Date(Date.now() + 5*86400000), points: 20 },
      { title: "AFAS 380 Discussion Post", courseCode: "AFAS380", dueDate: new Date(Date.now() + 7*86400000), points: 15 },
    ];
    let saved = 0;
    for (const a of parsed) {
      const days = (a.dueDate - Date.now()) / 86400000;
      const urgency = days < 3 ? "red" : days < 7 ? "yellow" : "green";
      if (onAddAssignment) onAddAssignment({ ...a, course: a.courseCode, urgency, status: "not_started", description: "", instructions: "", rubric: "", d2lLink: "https://d2l.arizona.edu", studentId: effectiveStudentId });
      if (effectiveStudentId && typeof effectiveStudentId === "string" && effectiveStudentId.includes("-")) {
        const r = await insertAssignment({ ...a, course: a.courseCode, urgency, status: "not_started", description: "", instructions: "", rubric: "", d2lLink: "" }, effectiveStudentId, sessionUser?.id);
        if (r) saved++;
      }
    }
    setIcsResult({ count: parsed.length, saved });
    setImporting(false); setIcsUrl("");
  };

  // Quick add (staff only)
  const updateRow = (i, k, v) => setRows(prev => prev.map((r, idx) => idx === i ? { ...r, [k]: v } : r));
  const handleSaveRows = () => {
    const valid = rows.filter(r => r.title.trim() && r.dueDate);
    if (!valid.length) return;
    valid.forEach(r => {
      const days = (new Date(r.dueDate) - Date.now()) / 86400000;
      const urgency = days < 3 ? "red" : days < 7 ? "yellow" : "green";
      const course = student?.courses?.find(c => c.code === r.courseCode);
      if (onAddAssignment) onAddAssignment({ id: Date.now() + Math.random(), title: r.title, course: course?.name || r.courseCode || "Other", courseCode: r.courseCode, dueDate: new Date(r.dueDate), points: parseInt(r.points) || 0, status: "not_started", urgency, description: "", instructions: "", rubric: "", d2lLink: "", studentId: effectiveStudentId });
    });
    setRows([{ title: "", courseCode: "", dueDate: "", points: "" }]);
    setQuickSaved(true); setTimeout(() => setQuickSaved(false), 2500);
  };

  // PDF/file reading
  const readFile = async (file) => {
    if (!file) return;
    if (!syllabusFile) setSyllabusFile(file.name);
    if (file.type === "application/pdf" || file.name.endsWith(".pdf")) {
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(" ") + "\n";
        }
        setSyllabusText(text.trim());
      } catch (e) {
        setSyllabusText("Could not extract text automatically. Please paste the syllabus text manually.");
      }
    } else {
      const reader = new FileReader();
      reader.onload = (e) => setSyllabusText(e.target.result || "");
      reader.readAsText(file);
    }
  };

  const handleDrop = (e) => { e.preventDefault(); setIsDragging(false); readFile(e.dataTransfer.files[0]); };

  // Extract assignments from syllabus using local regex parser
  // Works offline and locally — no API needed
  const handleExtract = async () => {
    if (!syllabusText.trim()) return;
    setExtracting(true); setExtractedItems([]);

    await new Promise(r => setTimeout(r, 500)); // brief pause so UI shows loading

    try {
      const text = syllabusText;
      const found = [];
      const seen = new Set();

      // Date patterns: "April 15", "Apr 15", "04/15", "04/15/2026", "April 15, 2026"
      const datePattern = /(?:Jan(?:uary)?|Feb(?:ruary)?|Mar(?:ch)?|Apr(?:il)?|May|Jun(?:e)?|Jul(?:y)?|Aug(?:ust)?|Sep(?:tember)?|Oct(?:ober)?|Nov(?:ember)?|Dec(?:ember)?)\s+\d{1,2}(?:,?\s*\d{4})?|\d{1,2}\/\d{1,2}(?:\/\d{2,4})?/gi;

      // Assignment type keywords
      const typeMap = {
        exam: "Exam", test: "Exam", midterm: "Exam", final: "Exam", quiz: "Quiz",
        essay: "Essay", paper: "Essay", report: "Essay", response: "Essay",
        project: "Project", presentation: "Project", homework: "Homework",
        assignment: "Homework", discussion: "Homework", lab: "Homework",
        reading: "Homework", worksheet: "Homework",
      };

      // Split into lines and look for lines with dates
      const lines = text.split("\n");
      for (const line of lines) {
        const trimmed = line.trim();
        if (trimmed.length < 5 || trimmed.length > 200) continue;

        const dateMatch = trimmed.match(datePattern);
        if (!dateMatch) continue;

        // Parse the date
        let dueDate = null;
        try {
          const raw = dateMatch[0];
          const parsed = new Date(raw.includes("/") ? raw : raw + (raw.match(/\d{4}/) ? "" : ", 2026"));
          if (!isNaN(parsed.getTime())) dueDate = parsed.toISOString().split("T")[0];
        } catch (e) { continue; }
        if (!dueDate) continue;

        // Extract title — remove the date from the line
        let title = trimmed.replace(dateMatch[0], "").replace(/[:\-–—|]+/g, " ").replace(/\s+/g, " ").trim();
        if (title.length < 3) continue;
        // Clean up leading/trailing punctuation
        title = title.replace(/^[,.\s]+|[,.\s]+$/g, "").trim();
        if (!title || seen.has(title.toLowerCase())) continue;
        seen.add(title.toLowerCase());

        // Detect type from keywords
        const lower = title.toLowerCase();
        let type = "Homework";
        for (const [kw, t] of Object.entries(typeMap)) {
          if (lower.includes(kw)) { type = t; break; }
        }

        // Extract points if mentioned
        const pointsMatch = trimmed.match(/(\d+)\s*(?:pts?|points?)/i);
        const points = pointsMatch ? parseInt(pointsMatch[1]) : (type === "Exam" ? 100 : type === "Essay" ? 100 : 25);

        found.push({ title, dueDate, points, type });
        if (found.length >= 20) break; // cap at 20
      }

      if (found.length > 0) {
        setExtractedItems(found);
      } else {
        // Nothing found with dates — show helpful message
        setExtractedItems([
          { title: `${syllabusCode || "Course"} — No dates found automatically`, dueDate: new Date(Date.now() + 30*86400000).toISOString().split("T")[0], points: 0, type: "Homework" },
        ]);
        console.warn("No assignments with dates found in syllabus text. Try pasting a section with due dates.");
      }
    } catch (e) {
      console.error("Extraction error:", e);
      setExtractedItems([]);
    }
    setExtracting(false);
  };

  // Toggle individual extracted assignment selection
  const toggleExtracted = (i) => setSelectedExtracted(prev => ({ ...prev, [i]: !prev[i] }));
  const selectAllExtracted = () => { const all = {}; extractedItems.forEach((_, i) => all[i] = true); setSelectedExtracted(all); };
  const selectedCount = Object.values(selectedExtracted).filter(Boolean).length;

  // Add selected extracted assignments to the student's list
  const handleAddExtractedAssignments = async () => {
    const toAdd = extractedItems.filter((_, i) => selectedExtracted[i]);
    if (!toAdd.length) return;
    for (const a of toAdd) {
      const dueDateObj = a.dueDate instanceof Date ? a.dueDate : new Date(a.dueDate);
      const days = (dueDateObj - Date.now()) / 86400000;
      const urgency = days < 3 ? "red" : days < 7 ? "yellow" : "green";
      const item = {
        id: `extracted-${Date.now()}-${Math.random()}`,
        title: a.title,
        course: syllabusCourseName || syllabusCode || "Course",
        courseCode: syllabusCode || "",
        dueDate: dueDateObj,
        points: a.points || 0,
        urgency,
        status: "not_started",
        description: "",
        instructions: "",
        rubric: "",
        d2lLink: "https://d2l.arizona.edu",
        studentId: effectiveStudentId,
      };
      // onAddAssignment handles both state update AND Supabase insert — don't double-insert
      if (onAddAssignment) {
        await onAddAssignment(item);
      } else if (effectiveStudentId && typeof effectiveStudentId === "string" && effectiveStudentId.includes("-")) {
        await insertAssignment(item, effectiveStudentId, sessionUser?.id);
      }
    }
    setAssignmentsAdded(true);
    setTimeout(() => setAssignmentsAdded(false), 3000);
  };

  // Save syllabus document record to Supabase (assignments added separately via handleAddExtractedAssignments)
  const handleSaveSyllabus = async () => {
    if (!syllabusFile.trim()) return;
    setSyllabusUploading(true);
    console.log("Saving syllabus — effectiveStudentId:", effectiveStudentId);
    const doc = await insertDocument({ fileName: syllabusFile, courseCode: syllabusCode, courseName: syllabusCourseName, type: "Syllabus", semester: "Spring 2026", uploadedByRole: isStudent ? "student" : "staff", fileUrl: "", extractedAssignments: extractedItems }, effectiveStudentId, sessionUser?.id);
    if (doc) {
      setDocs(prev => [doc, ...prev]);
      setSyllabusSaved(true);
      // Pre-select all extracted items
      if (extractedItems.length) selectAllExtracted();
      setTimeout(() => setSyllabusSaved(false), 3000);
    } else {
      console.warn("Document insert failed — check Supabase logs. effectiveStudentId:", effectiveStudentId);
      // Save locally even if Supabase fails
      setDocs(prev => [{ id: Date.now(), file_name: syllabusFile, course_code: syllabusCode, course_name: syllabusCourseName, document_type: "Syllabus", created_at: new Date().toISOString(), uploaded_by_role: isStudent ? "student" : "staff", extracted_assignments: extractedItems }, ...prev]);
      setSyllabusSaved(true);
      if (extractedItems.length) selectAllExtracted();
      setTimeout(() => setSyllabusSaved(false), 3000);
    }
    setSyllabusUploading(false);
  };

  const inputStyle = { width: "100%", padding: "9px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box", background: "white" };

  const tabs = [
    { id: "d2l", label: "📅 D2L Import" },
    ...(!isStudent ? [{ id: "quickadd", label: "⚡ Quick Add" }] : []),
    { id: "syllabus", label: "📄 Syllabus" },
    { id: "saved", label: `📁 Saved (${docs.length})` },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <h2 style={{ fontSize: 22, fontWeight: 900, color: UA.text, margin: 0 }}>Entry Hub</h2>
          <p style={{ color: UA.textMuted, fontSize: 14, marginTop: 4 }}>Import assignments, upload syllabi, and manage course content{!isStudent ? " for your students" : ""}.</p>
        </div>
      </div>

      {/* Student selector — staff only */}
      {!isStudent && (
        <Card style={{ padding: "14px 18px" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 10 }}>Working with</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 8 }}>
            {students.map(s => {
              const hasRealId = isRealUUID(s.id);
              return (
                <button key={s.id} onClick={() => setSelectedStudentId(s.id)}
                  style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 14px", borderRadius: 99, border: `1.5px solid ${selectedStudentId === s.id ? UA.navy : UA.border}`, background: selectedStudentId === s.id ? UA.navy : "white", cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s", opacity: hasRealId ? 1 : 0.6 }}>
                  <Avatar initials={s.initials} size={22} color={selectedStudentId === s.id ? "white" : UA.navy} />
                  <span style={{ fontSize: 13, fontWeight: 700, color: selectedStudentId === s.id ? "white" : UA.text }}>{s.name.split(" ")[0]}</span>
                  {!hasRealId && <span style={{ fontSize: 9, color: selectedStudentId === s.id ? "rgba(255,255,255,0.6)" : UA.textMuted }}>demo</span>}
                </button>
              );
            })}
          </div>
          {!studentHasRealId && (
            <div style={{ fontSize: 12, color: UA.orange, fontWeight: 600, padding: "6px 10px", borderRadius: UA.radiusSm, background: UA.orangeBg, border: `1px solid ${UA.orangeBorder}` }}>
              ⚠️ Selected student is demo data — saves will only work for real Supabase students like Cornelius Warren.
            </div>
          )}
        </Card>
      )}

      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, border: `1.5px solid ${UA.border}`, borderRadius: UA.radiusSm, overflow: "hidden", alignSelf: "flex-start" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)}
            style={{ padding: "9px 18px", border: "none", borderRight: `1px solid ${UA.border}`, background: activeTab === t.id ? UA.navy : "white", color: activeTab === t.id ? "white" : UA.textMuted, fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", transition: "all 0.15s" }}>
            {t.label}
          </button>
        ))}
      </div>

      {/* D2L IMPORT TAB */}
      {activeTab === "d2l" && (
        <Card style={{ border: `1.5px solid ${UA.navyBorder}`, background: UA.navyLight }}>
          <div style={{ fontWeight: 800, fontSize: 14, color: UA.navy, marginBottom: 4 }}>🔗 Import from D2L Calendar</div>
          <div style={{ fontSize: 12, color: UA.textMuted, marginBottom: 14, lineHeight: 1.6 }}>
            In D2L: <strong>Calendar → Subscribe → Copy feed URL</strong>. Paste it below to import all assignments automatically.
            {!isStudent && " Assignments will be saved under the selected student's account."}
          </div>

              <input type="date" value={row.dueDate} onChange={e => updateRow(i, "dueDate", e.target.value)}

              <input type="number" value={row.points} onChange={e => updateRow(i, "points", e.target.value)} placeholder="pts"
                style={{ padding: "8px 10px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none" }} />
              <button onClick={() => setRows(prev => prev.filter((_, idx) => idx !== i))} disabled={rows.length === 1}
                style={{ padding: "8px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, background: "white", cursor: rows.length === 1 ? "not-allowed" : "pointer", color: UA.textMuted, fontSize: 14, opacity: rows.length === 1 ? 0.3 : 1 }}>✕</button>
            </div>
          ))}
          <div style={{ display: "flex", gap: 10, marginTop: 10 }}>
            <Btn variant="ghost" size="sm" onClick={() => setRows(prev => [...prev, { title: "", courseCode: "", dueDate: "", points: "" }])}>+ Add Row</Btn>
            <Btn size="sm" onClick={handleSaveRows}>Save All</Btn>
            {quickSaved && <span style={{ fontSize: 13, color: UA.green, fontWeight: 700, alignSelf: "center" }}>✓ Assignments added</span>}
          </div>
        </Card>
      )}

      {/* SYLLABUS TAB */}
      {activeTab === "syllabus" && (
        <Card>
          <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 14 }}>📄 Upload Syllabus</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 10 }}>
            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, display: "block", marginBottom: 4 }}>Course Code *</label>
              <input value={syllabusCode} onChange={e => setSyllabusCode(e.target.value)} placeholder="e.g. ENGL101" style={inputStyle} />

            <div>
              <label style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, display: "block", marginBottom: 4 }}>Course Name</label>
              <input value={syllabusCourseName} onChange={e => setSyllabusCourseName(e.target.value)} placeholder="e.g. English Composition" style={inputStyle} />

          </div>
          <div style={{ marginBottom: 10 }}>
            <label style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, display: "block", marginBottom: 4 }}>File Name *</label>
            <input value={syllabusFile} onChange={e => setSyllabusFile(e.target.value)} placeholder="e.g. ENGL101 Syllabus Spring 2026.pdf" style={inputStyle} />
          </div>
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
              <label style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted }}>
                Syllabus Text <span style={{ fontWeight: 400 }}>(drag & drop PDF, browse, or paste)</span>
              </label>
              <button onClick={() => fileRef.current.click()}
                style={{ fontSize: 11, fontWeight: 700, color: UA.navy, background: UA.navyLight, border: `1px solid ${UA.navyBorder}`, borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" }}>

              </button>
              <input ref={fileRef} type="file" accept=".pdf,.txt,.doc,.docx" onChange={e => readFile(e.target.files[0])} style={{ display: "none" }} />
            </div>
            <textarea value={syllabusText} onChange={e => setSyllabusText(e.target.value)}
              placeholder="Drag & drop a PDF here, click Browse file, or paste your syllabus text — then hit Extract Assignments."
              rows={6}
              onDragOver={e => { e.preventDefault(); setIsDragging(true); }}
              onDragLeave={() => setIsDragging(false)}
              onDrop={handleDrop}
              style={{ ...inputStyle, resize: "vertical", lineHeight: 1.6, border: `1.5px solid ${isDragging ? UA.navy : UA.border}`, background: isDragging ? UA.navyLight : "white", transition: "all 0.15s" }} />

          </div>

              <Btn size="sm" variant="secondary" onClick={handleExtract} disabled={extracting}>
                {extracting ? "⏳ Extracting..." : "✨ Extract Assignments"}
              </Btn>
            )}
            <Btn size="sm" onClick={handleSaveSyllabus} disabled={!syllabusFile.trim() || syllabusUploading}>
              {syllabusUploading ? "Saving..." : "💾 Save Syllabus"}
            </Btn>
            {syllabusSaved && <span style={{ fontSize: 13, color: UA.green, fontWeight: 700 }}>✓ Saved{!isStudent ? " — visible on student profile" : " — your LS can see this"}</span>}
          </div>

          {/* Extracted assignments — with checkboxes and confirm step */}
          {extractedItems.length > 0 && (
            <div style={{ marginTop: 16, padding: "16px 18px", borderRadius: UA.radiusSm, background: UA.navyLight, border: `1.5px solid ${UA.navyBorder}` }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                <div style={{ fontWeight: 700, fontSize: 13, color: UA.navy }}>✨ {extractedItems.length} assignments extracted — select which to add</div>
                <button onClick={selectAllExtracted} style={{ fontSize: 11, fontWeight: 700, color: UA.navy, background: "white", border: `1px solid ${UA.navyBorder}`, borderRadius: 6, padding: "3px 10px", cursor: "pointer", fontFamily: "inherit" }}>Select All</button>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 12 }}>
                {extractedItems.map((a, i) => (
                  <div key={i} onClick={() => toggleExtracted(i)}
                    style={{ display: "flex", alignItems: "center", gap: 12, padding: "9px 12px", borderRadius: UA.radiusSm, background: selectedExtracted[i] ? "white" : "rgba(255,255,255,0.5)", border: `1.5px solid ${selectedExtracted[i] ? UA.navy : UA.navyBorder}`, cursor: "pointer", transition: "all 0.12s" }}>
                    <div style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${selectedExtracted[i] ? UA.navy : UA.navyBorder}`, background: selectedExtracted[i] ? UA.navy : "white", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                      {selectedExtracted[i] && <span style={{ color: "white", fontSize: 11, fontWeight: 900 }}>✓</span>}
                    </div>
                    <div style={{ flex: 1 }}>
                      <span style={{ fontWeight: 700, fontSize: 13, color: UA.text }}>{a.title}</span>
                      <span style={{ fontSize: 12, color: UA.textMuted }}> · {a.type} · {a.points} pts</span>
                    </div>
                    <span style={{ fontSize: 12, color: UA.textMuted, flexShrink: 0 }}>Due {new Date(a.dueDate).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                <button onClick={handleAddExtractedAssignments} disabled={selectedCount === 0}
                  style={{ padding: "9px 18px", borderRadius: UA.radiusSm, border: "none", background: selectedCount > 0 ? UA.navy : UA.border, color: "white", fontSize: 13, fontWeight: 700, cursor: selectedCount > 0 ? "pointer" : "not-allowed", fontFamily: "inherit" }}>
                  + Add {selectedCount > 0 ? `${selectedCount} ` : ""}Assignment{selectedCount !== 1 ? "s" : ""} to {!isStudent ? student?.name?.split(" ")[0] || "Student" : "My List"}
                </button>
                {assignmentsAdded && <span style={{ fontSize: 13, color: UA.green, fontWeight: 700 }}>✓ Added to assignment list</span>}
              </div>
            </div>
          )}
        </Card>
      )}

      {/* SAVED DOCS TAB */}
      {activeTab === "saved" && (
        <SavedDocsTab
          docs={docs}
          setDocs={setDocs}
          student={student}
          syllabusCourseName={syllabusCourseName}
          syllabusCode={syllabusCode}
          onAddAssignment={onAddAssignment}
          effectiveStudentId={effectiveStudentId}
          sessionUser={sessionUser}
          isStudent={isStudent}
        />
      )}
    </div>
  );
}


// --- PROGRESS REPORT PAGE -----------------------------------------------------
// Staff selects a student + date range and gets a compiled visual report
function ProgressReportPage({ onSelectStudent }) {
  const [selectedId, setSelectedId] = useState(STUDENTS[0].id);
  const [dateRange, setDateRange] = useState("semester");
  const [generating, setGenerating] = useState(false);
  const [generated, setGenerated] = useState(false);

  const student = STUDENTS.find(s => s.id === selectedId);
  const logs = SESSION_LOGS[selectedId] || [];
  const notes = STAFF_NOTES[selectedId] || [];

  const handleGenerate = () => {
    setGenerating(true);
    setTimeout(() => { setGenerating(false); setGenerated(true); }, 1200);
  };

  const completionRate = Math.round((ASSIGNMENTS.filter(a => a.status === "completed").length / ASSIGNMENTS.length) * 100);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 22 }}>
      <SectionTitle sub="Build a visual progress report for any student over any date range">Progress Report</SectionTitle>

      {/* Controls */}
      <Card style={{ padding: "16px 20px" }}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr auto", gap: 14, alignItems: "end" }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Student</div>
            <select value={selectedId} onChange={e => { setSelectedId(Number(e.target.value)); setGenerated(false); }}
              style={{ width: "100%", padding: "9px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", background: "white" }}>
              {STUDENTS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: UA.textMuted, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>Date Range</div>
            <select value={dateRange} onChange={e => { setDateRange(e.target.value); setGenerated(false); }}
              style={{ width: "100%", padding: "9px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", background: "white" }}>
              <option value="week">This Week</option>
              <option value="month">This Month</option>
              <option value="semester">Full Semester</option>
            </select>
          </div>
          <Btn onClick={handleGenerate} disabled={generating}>
            {generating ? "⏳ Building..." : "Generate Report →"}
          </Btn>
        </div>
      </Card>

      {/* Generated report */}
      {generated && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          {/* Report header */}
          <div style={{ background: UA.navy, borderRadius: UA.radius, padding: "24px 28px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <Avatar initials={student.initials} size={52} color={UA.red} />
              <div>
                <div style={{ fontSize: 20, fontWeight: 900, color: "white" }}>{student.name}</div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.6)", marginTop: 3 }}>{student.sport} · {student.year} · GPA {student.gpa}</div>
                <div style={{ marginTop: 6 }}><RiskBadge level={student.dynamicRisk} score={student.riskScore} /></div>
              </div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>
                {dateRange === "week" ? "This Week" : dateRange === "month" ? "This Month" : "Spring 2026 Semester"}
              </div>
              <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Generated {new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</div>
              <div style={{ marginTop: 10 }}>
                <Btn size="sm" variant="outline" onClick={() => window.print()}>📄 Export PDF</Btn>
              </div>
            </div>
          </div>

          {/* Metrics */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14 }}>
            {[
              { label: "Avg Effort", value: `${student.avgEffort}/5`, color: student.avgEffort >= 3.5 ? UA.green : UA.red },
              { label: "Avg Understanding", value: `${student.avgUnderstanding}/5`, color: student.avgUnderstanding >= 3 ? UA.green : UA.red },
              { label: "Completion Rate", value: `${completionRate}%`, color: completionRate >= 70 ? UA.green : UA.red },
              { label: "Study Hours", value: `${student.totalHours}h`, color: UA.navy },
            ].map((s, i) => (
              <Card key={i} style={{ padding: "16px 18px", textAlign: "center" }}>
                <div style={{ fontSize: 11, color: UA.textMuted, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.04em", marginBottom: 8 }}>{s.label}</div>
                <div style={{ fontSize: 28, fontWeight: 900, color: s.color }}>{s.value}</div>
              </Card>
            ))}
          </div>

          {/* Effort trend chart */}
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 14 }}>Effort & Understanding Trend</div>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={EFFORT_TREND}>
                <CartesianGrid strokeDasharray="3 3" stroke={UA.border} />
                <XAxis dataKey="week" tick={{ fontSize: 11, fill: UA.textMuted }} axisLine={false} tickLine={false} />
                <YAxis domain={[0,5]} tick={{ fontSize: 11, fill: UA.textMuted }} axisLine={false} tickLine={false} />
                <Tooltip contentStyle={{ borderRadius: UA.radiusSm, border: `1px solid ${UA.border}` }} />
                <Legend wrapperStyle={{ fontSize: 12 }} />
                <Line type="monotone" dataKey="effort" stroke={UA.red} strokeWidth={2.5} dot={{ r: 4 }} name="Effort" />
                <Line type="monotone" dataKey="understanding" stroke={UA.navy} strokeWidth={2.5} dot={{ r: 4 }} name="Understanding" />
              </LineChart>
            </ResponsiveContainer>
          </Card>

          {/* Session log summary */}
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 14 }}>Work Sessions ({logs.length})</div>
            {logs.length === 0 ? <div style={{ color: UA.textMuted, fontSize: 13 }}>No sessions logged in this period</div> : (
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {logs.map(log => (
                  <div key={log.id} style={{ display: "flex", alignItems: "center", gap: 14, padding: "10px 14px", borderRadius: UA.radiusSm, background: UA.bg, border: `1px solid ${UA.border}` }}>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: 700, fontSize: 13, color: UA.text }}>{log.assignment}</div>
                      <div style={{ fontSize: 12, color: UA.textMuted, marginTop: 2 }}>{log.date} · {log.timeSpent} min</div>
                    </div>
                    <div style={{ display: "flex", gap: 10, fontSize: 12, color: UA.textMuted }}>
                      <span>Effort <strong style={{ color: log.effort >= 3 ? UA.green : UA.red }}>{log.effort}/5</strong></span>
                      <span>Understanding <strong style={{ color: log.understanding >= 3 ? UA.green : UA.red }}>{log.understanding}/5</strong></span>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </Card>

          {/* Staff notes summary */}
          <Card>
            <div style={{ fontWeight: 800, fontSize: 14, color: UA.text, marginBottom: 14 }}>Staff Notes ({notes.length})</div>
            {notes.length === 0 ? <div style={{ color: UA.textMuted, fontSize: 13 }}>No notes in this period</div> : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {notes.map(note => <NoteCard key={note.id} note={note} />)}
              </div>
            )}
          </Card>

          {/* FERPA footer */}
          <div style={{ textAlign: "center", fontSize: 12, color: UA.textMuted, padding: "8px 0", borderTop: `1px solid ${UA.border}` }}>
            CATS Academic Companion · University of Arizona · CONFIDENTIAL — FERPA-protected educational record. Authorized sharing only.
          </div>
        </div>
      )}

      {!generated && (
        <div style={{ textAlign: "center", padding: "60px 0", color: UA.textMuted }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>📊</div>
          <div style={{ fontSize: 16, fontWeight: 700, color: UA.text, marginBottom: 8 }}>Select a student and date range</div>
          <div style={{ fontSize: 14 }}>Then click Generate Report to build a shareable progress summary</div>
        </div>
      )}
    </div>
  );
}

// Staff sidebar Notes page — all notes across all students, reverse chronological
function GlobalNotesFeed() {

    "Session Note": { bg: UA.navyLight, color: UA.navy, border: UA.navyBorder },
    "Concern Flag": { bg: UA.redLight, color: UA.red, border: UA.redBorder },
    "Follow-Up Required": { bg: UA.yellowBg, color: UA.yellow, border: UA.yellowBorder },
    "Intake Observation": { bg: UA.greenBg, color: UA.green, border: UA.greenBorder },
  };
  const filtered = ALL_NOTES_FEED.filter(n => filterCategory === "all" || n.category === filterCategory);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <SectionTitle sub="All staff notes across your caseload — most recent first">Notes Feed</SectionTitle>
      </div>
      {/* Category filter */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {["all", "Session Note", "Concern Flag", "Follow-Up Required", "Intake Observation"].map(cat => (
          <button key={cat} onClick={() => setFilterCategory(cat)}
            style={{ padding: "5px 14px", borderRadius: 99, fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", border: `1.5px solid ${filterCategory === cat ? UA.navy : UA.border}`, background: filterCategory === cat ? UA.navy : "white", color: filterCategory === cat ? "white" : UA.textMuted, transition: "all 0.15s" }}>
            {cat === "all" ? "All Notes" : cat}
          </button>
        ))}
      </div>
      {/* Notes list */}
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {filtered.map(note => {
          const c = catColors[note.category] || catColors["Session Note"];
          const riskColor = note.studentRisk === "high" ? UA.red : note.studentRisk === "medium" ? UA.yellow : UA.green;
          return (
            <div key={note.id} style={{ background: UA.bgCard, border: `1px solid ${UA.border}`, borderRadius: UA.radius, padding: "16px 20px", borderLeft: `4px solid ${c.color}`, boxShadow: UA.shadow }}>
              {/* Student + category header */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <Avatar initials={note.studentInitials} size={32} color={riskColor} />
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: UA.text }}>{note.studentName}</div>
                    <div style={{ fontSize: 11, color: UA.textMuted }}>{note.author} · {note.date}</div>
                  </div>
                  <RiskBadge level={note.studentRisk} />
                </div>
                <span style={{ fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 99, background: c.bg, color: c.color, border: `1px solid ${c.border}` }}>{note.category}</span>
              </div>
              <p style={{ fontSize: 13, color: UA.textSecondary, lineHeight: 1.7, margin: 0 }}>{note.text}</p>
            </div>
          );
        })}
        {filtered.length === 0 && <div style={{ textAlign: "center", padding: "40px 0", color: UA.textMuted, fontSize: 14 }}>No notes matching this filter</div>}
      </div>
    </div>
  );
}

// --- SESSION LOG TAB ----------------------------------------------------------
// Shows on student profile — every Work Mode session the student has logged.
// This is what the LS reviews before a meeting.
function SessionLogTab({ studentId }) {
  const logs = SESSION_LOGS[studentId] || [];
  const effortColor = (v) => v >= 4 ? UA.green : v >= 3 ? UA.yellow : UA.red;

  if (logs.length === 0) return (
    <div style={{ textAlign: "center", padding: "48px 0", color: UA.textMuted, fontSize: 14 }}>
      <div style={{ fontSize: 32, marginBottom: 12 }}>📋</div>
      No work sessions logged yet for this student.
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {logs.map(log => (
        <div key={log.id} style={{ background: UA.bgCard, border: `1px solid ${UA.border}`, borderRadius: UA.radius, padding: "18px 20px", boxShadow: UA.shadow }}>
          {/* Header */}

// Manual assignment entry form — used until D2L sync is live.
function AddAssignmentModal({ onClose, onAdd }) {
  const [form, setForm] = useState({
    title: "", course: "", courseCode: "", dueDate: "", points: "",
    description: "", instructions: "", rubric: "", status: "not_started",
  });
  const [errors, setErrors] = useState({});

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const validate = () => {
    const e = {};
    if (!form.title.trim()) e.title = "Required";
    if (!form.course.trim()) e.course = "Required";
    if (!form.dueDate) e.dueDate = "Required";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleSubmit = () => {
    if (!validate()) return;
    const urgency = (() => {
      const days = (new Date(form.dueDate) - Date.now()) / 86400000;
      if (days < 3) return "red";
      if (days < 7) return "yellow";
      return "green";
    })();
    onAdd({
      id: Date.now(),
      ...form,
      points: parseInt(form.points) || 0,
      dueDate: new Date(form.dueDate),
      urgency,
      d2lLink: "",
    });
    onClose();
  };

  const Field = ({ label, k, type = "text", placeholder = "", required, rows }) => (
    <div style={{ marginBottom: 14 }}>
      <label style={{ fontSize: 12, fontWeight: 700, color: UA.textMuted, display: "block", marginBottom: 5 }}>
        {label}{required && <span style={{ color: UA.red }}> *</span>}
      </label>
      {rows ? (
        <textarea value={form[k]} onChange={e => set(k, e.target.value)} placeholder={placeholder} rows={rows}
          style={{ width: "100%", padding: "9px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${errors[k] ? UA.red : UA.border}`, fontSize: 13, fontFamily: "inherit", resize: "vertical", outline: "none", boxSizing: "border-box" }} />
      ) : (
        <input type={type} value={form[k]} onChange={e => set(k, e.target.value)} placeholder={placeholder}
          style={{ width: "100%", padding: "9px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${errors[k] ? UA.red : UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
      )}
      {errors[k] && <div style={{ fontSize: 11, color: UA.red, marginTop: 3 }}>{errors[k]}</div>}
    </div>
  );

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ background: "white", borderRadius: UA.radius, width: "100%", maxWidth: 560, maxHeight: "90vh", overflow: "auto", boxShadow: UA.shadowMd }}>
        <div style={{ padding: "20px 24px", borderBottom: `1px solid ${UA.border}`, display: "flex", justifyContent: "space-between", alignItems: "center", position: "sticky", top: 0, background: "white", zIndex: 1 }}>
          <div style={{ fontWeight: 800, fontSize: 16, color: UA.text }}>Add Assignment</div>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 20, cursor: "pointer", color: UA.textMuted }}>✕</button>
        </div>
        <div style={{ padding: "20px 24px" }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 16px" }}>
            <div style={{ gridColumn: "1 / -1" }}><Field label="Assignment Title" k="title" placeholder="e.g. Essay: The Great Gatsby" required /></div>
            <Field label="Course Name" k="course" placeholder="e.g. English 201" required />
            <Field label="Course Code" k="courseCode" placeholder="e.g. ENG201" />
            <Field label="Due Date" k="dueDate" type="date" required />
            <Field label="Points" k="points" type="number" placeholder="e.g. 100" />
          </div>
          <Field label="Description" k="description" placeholder="Brief overview of the assignment..." rows={2} />
          <Field label="Instructions" k="instructions" placeholder="What specifically does the student need to do?" rows={3} />
          <Field label="Rubric" k="rubric" placeholder="e.g. Thesis (25pts) · Analysis (30pts) · Citations (25pts) · Grammar (20pts)" rows={2} />
          <div style={{ marginBottom: 14 }}>
            <label style={{ fontSize: 12, fontWeight: 700, color: UA.textMuted, display: "block", marginBottom: 5 }}>Status</label>
            <select value={form.status} onChange={e => set("status", e.target.value)} style={{ width: "100%", padding: "9px 12px", borderRadius: UA.radiusSm, border: `1.5px solid ${UA.border}`, fontSize: 13, fontFamily: "inherit", outline: "none" }}>
              <option value="not_started">Not Started</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
            </select>
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
            <Btn variant="outline" fullWidth onClick={onClose}>Cancel</Btn>
            <Btn fullWidth onClick={handleSubmit}>Add Assignment</Btn>
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [collapsed, setCollapsed] = useState(false);
  const [workAssignment, setWorkAssignment] = useState(null);
  const [selectedStudent, setSelectedStudent] = useState(null);
  const [showOnboarding, setShowOnboarding] = useState(false);
  const [notifications, setNotifications] = useState([
    { id: 1, icon: "⚠️", message: "Alex Rivera's risk score moved to High — 2 missing assignments", time: "2 hours ago", read: false },
    { id: 2, icon: "📝", message: "Marcus Williams has not logged a session in 6 days", time: "Yesterday", read: false },
    { id: 3, icon: "✅", message: "Jordan Kim completed all assignments this week", time: "2 days ago", read: true },
  ]);
  const [assignments, setAssignments] = useState(ASSIGNMENTS);
  const [assignmentsMode, setAssignmentsMode] = useState("demo"); // "demo" | "live"
  const [sessionUser, setSessionUser] = useState(null);
  const [profile, setProfile] = useState(null);
  const [authLoading, setAuthLoading] = useState(true);
  const [authError, setAuthError] = useState("");
  const [backendStatus, setBackendStatus] = useState({ profileMode: "loading", studentsMode: "demo", studentsMessage: "Using demo student roster until the students table is connected." });
  const [dataVersion, setDataVersion] = useState(0);
  const isMobile = useIsMobile();

  const applyRoleRouting = (resolvedRole) => {
    setRole(resolvedRole);
    localStorage.setItem("cats_role", resolvedRole);
    if (resolvedRole === "student") { setPage("dashboard"); setShowOnboarding(true); }
    else if (resolvedRole === "admin") setPage("admin");
    else setPage("roster");
  };

  const hydrateAuthenticatedState = async (user) => {
    if (!user) {
      setSessionUser(null);
      setProfile(null);
      setRole(null);
      setAuthLoading(false);
      return;
    }

    setAuthLoading(true);
    setSessionUser(user);
    setAuthError("");

    const fallbackName = deriveDisplayNameFromEmail(user.email || "");
    const fallbackRole = normalizeRole(localStorage.getItem("cats_role") || "staff");
    let resolvedProfile = { id: user.id, email: user.email || "", full_name: fallbackName, role: fallbackRole, initials: initialsFromName(fallbackName) };

    const profileResult = await fetchProfileForUser(user.id);
    if (profileResult.error) {
      console.warn("Profiles lookup blocked or unavailable. Falling back to auth user.", profileResult.error);
      setBackendStatus(prev => ({ ...prev, profileMode: "fallback" }));
    } else if (profileResult.data) {
      resolvedProfile = {
        ...resolvedProfile,
        ...profileResult.data,
        full_name: profileResult.data.full_name || profileResult.data.Full_Name || resolvedProfile.full_name,
        role: normalizeRole(profileResult.data.role || resolvedProfile.role),
      };
      setBackendStatus(prev => ({ ...prev, profileMode: "live" }));
    } else {
      setBackendStatus(prev => ({ ...prev, profileMode: "fallback" }));
    }

    resolvedProfile.initials = initialsFromName(resolvedProfile.full_name || fallbackName);
    setProfile(resolvedProfile);
    applyRoleRouting(normalizeRole(resolvedProfile.role));

    const studentsResult = await supabase.from("students").select("*");
    if (!studentsResult.error && Array.isArray(studentsResult.data) && studentsResult.data.length) {
      STUDENTS = studentsResult.data.map(normalizeStudentRecord);
      setBackendStatus(prev => ({ ...prev, studentsMode: "live", studentsMessage: `${studentsResult.data.length} live student records loaded from Supabase.` }));
      setDataVersion(v => v + 1);
    } else if (studentsResult.error) {
      console.warn("Students table not loaded. Using demo student roster.", studentsResult.error);
      setBackendStatus(prev => ({ ...prev, studentsMode: "demo", studentsMessage: "Students table is not connected yet, so the app is still showing demo roster data." }));
    } else {
      setBackendStatus(prev => ({ ...prev, studentsMode: "demo", studentsMessage: "Students table is connected but currently empty, so the app is still showing demo roster data." }));
    }

    // Load assignments from Supabase
    const liveAssignments = await fetchAllAssignments();
    if (liveAssignments === null) {
      // fetch failed — keep mock data
      console.warn("Assignments fetch failed — using mock data.");
      setAssignmentsMode("demo");
    } else if (liveAssignments.length === 0) {
      // table connected but empty — keep mock data as fallback so UI isn't blank
      console.log("Assignments table connected but empty — using mock data until real assignments are added.");
      setAssignmentsMode("demo");
    } else {
      setAssignments(liveAssignments);
      setAssignmentsMode("live");
      console.log(`✅ ${liveAssignments.length} assignments loaded from Supabase.`);
    }

    setAuthLoading(false);
  };

  useEffect(() => {
    fetchSessionUser().then(user => hydrateAuthenticatedState(user));
    const { data: listener } = supabase.auth.onAuthStateChange((_event, session) => {
      hydrateAuthenticatedState(session?.user || null);
    });
    return () => listener?.subscription?.unsubscribe?.();
  }, []);

  const navigate = (target, data) => {
    if (target === "workmode") setWorkAssignment(data);
    if (target === "studentProfile") { setSelectedStudent(data); setPage("studentProfile"); return; }
    setPage(target);
    window.scrollTo(0, 0);
  };

  const pushNotification = (message, icon = "🔔") => {
    setNotifications(prev => [{ id: Date.now(), icon, message, time: "Just now", read: false }, ...prev]);
  };

  const currentUser = profile
    ? { name: profile.full_name || profile.Full_Name || deriveDisplayNameFromEmail(profile.email || sessionUser?.email || ""), initials: profile.initials || initialsFromName(profile.full_name || deriveDisplayNameFromEmail(profile.email || sessionUser?.email || "")) }
    : { name: deriveDisplayNameFromEmail(sessionUser?.email || "user@example.com"), initials: initialsFromName(deriveDisplayNameFromEmail(sessionUser?.email || "user@example.com")) };

  if (authLoading) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: UA.bg, fontFamily: "'DM Sans', system-ui, sans-serif" }}>
        <Card style={{ maxWidth: 420, textAlign: "center" }}>
          <div style={{ fontSize: 18, fontWeight: 800, color: UA.text, marginBottom: 8 }}>Connecting to your backend</div>
          <div style={{ fontSize: 14, color: UA.textMuted, lineHeight: 1.6 }}>Checking your Supabase session, loading your profile, and pulling in any live student records that already exist.</div>
        </Card>
      </div>
    );
  }

  if (!sessionUser) {
    return <SupabaseAuthPage onSignedIn={user => hydrateAuthenticatedState(user)} initialEmail={sessionUser?.email || ""} errorMessage={authError} />;
  }

  if (page === "workmode") return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif" }}>
      <WorkModePage
        assignment={workAssignment}
        onBack={() => setPage("assignments")}
        onSessionSaved={(data) => {
          if (data.understanding <= 2) pushNotification(`${currentUser.name} rated understanding ${data.understanding}/5 on "${data.title}" — may need support`, "⚠️");
        }}
      />
    </div>
  );

  const addAssignment = async (a) => {
    // Determine the student UUID — use selectedStudent's real Supabase id if available
    const studentId = a.studentId || selectedStudent?.id || null;
    const userId = sessionUser?.id || null;

    // Optimistically update UI immediately
    const tempId = `temp-${Date.now()}`;
    setAssignments(prev => [...prev, { ...a, id: tempId }]);
    pushNotification(`Assignment added: "${a.title}"`, "📚");

    // Save to Supabase if we have a valid student UUID
    if (studentId && typeof studentId === "string" && studentId.includes("-")) {
      const saved = await insertAssignment(a, studentId, userId);
      if (saved) {
        // Replace temp entry with real Supabase record
        setAssignments(prev => prev.map(x => x.id === tempId ? { ...a, id: saved.id } : x));
        console.log("✅ Assignment saved to Supabase:", saved.id);
      } else {
        console.warn("Assignment saved locally only — Supabase insert failed.");
      }
    } else {
      console.log("Assignment saved locally only — no valid student UUID available.");
    }
  };

  const backendBanner = (
    <div style={{ margin: isMobile ? "12px 12px 0" : "16px 20px 0", padding: "12px 14px", borderRadius: 12, border: `1px solid ${backendStatus.studentsMode === "live" ? UA.greenBorder : UA.yellowBorder}`, background: backendStatus.studentsMode === "live" ? UA.greenBg : UA.yellowBg, display: "flex", flexDirection: "column", gap: 4 }}>
      <div style={{ fontSize: 13, fontWeight: 800, color: backendStatus.studentsMode === "live" ? UA.green : UA.yellow }}>Backend status</div>
      <div style={{ fontSize: 13, color: UA.textSecondary, lineHeight: 1.5 }}>
        Signed in as <strong>{sessionUser.email}</strong>. {backendStatus.profileMode === "live" ? "Your real profile loaded from Supabase." : "Your role/display name are using a fallback because the profiles table is still blocked or missing an RLS policy."} {backendStatus.studentsMessage}
      </div>
    </div>
  );

  const renderPage = () => {
    if (page === "admin") return <AdminPage key={`admin-${dataVersion}`} onSelectStudent={s => { setSelectedStudent(s); setPage("studentProfile"); }} />;
    if (page === "roster") return <RosterPage key={`roster-${dataVersion}`} onSelectStudent={s => { setSelectedStudent(s); setPage("studentProfile"); }} />;
    if (page === "studentProfile" && selectedStudent) return (
      <StudentProfile key={`student-profile-${selectedStudent.id}-${dataVersion}`} student={selectedStudent} onBack={() => setPage("roster")} onExportReport={(student, notes) => exportStudentReport(student, notes, assignments)} onAddAssignment={addAssignment} sessionUser={sessionUser} />
    );
    if (page === "entryhub") return <EntryHubPage key={`entryhub-${dataVersion}`} onAddAssignment={addAssignment} sessionUser={sessionUser} role={role} students={STUDENTS} />;
    if (page === "analytics" && role !== "student") return <ProgressReportPage key={`analytics-${dataVersion}`} onSelectStudent={s => { setSelectedStudent(s); setPage("studentProfile"); }} />;
    if (page === "analytics" && role === "student") return <AnalyticsPage role={role} assignments={assignments} />;
    if (page === "settings") return <SettingsPage role={role} />;
    if (page === "notes") return <GlobalNotesFeed />;
    if (page === "risk") return <RiskMarkersPage key={`risk-${dataVersion}`} onSelectStudent={s => { setSelectedStudent(s); setPage("studentProfile"); }} />;
    if (page === "assignments") return <AssignmentsPage onNavigate={navigate} assignments={assignments} onAddAssignment={addAssignment} />;
    if (page === "dashboard" && role !== "student") return <StaffDashboard key={`dashboard-${dataVersion}`} onSelectStudent={s => { setSelectedStudent(s); setPage("studentProfile"); }} />;
    // Student can access their own profile
    if (page === "myprofile" && role === "student") {
      const myStudent = STUDENTS.find(s => s.email === sessionUser?.email) || STUDENTS[0];
      return <StudentProfile key={`my-profile-${dataVersion}`} student={myStudent} onBack={() => setPage("dashboard")} onExportReport={(s, n) => exportStudentReport(s, n, assignments)} onAddAssignment={addAssignment} sessionUser={sessionUser} />;
    }
    return role === "student"
      ? <StudentDashboard onNavigate={navigate} assignments={assignments} user={currentUser} onViewProfile={() => setPage("myprofile")} />
      : <StaffDashboard key={`staff-${dataVersion}`} onSelectStudent={s => { setSelectedStudent(s); setPage("studentProfile"); }} />;
  };

  const mobileNav = role === "student"
    ? [{ id: "dashboard", icon: "⊞", label: "Home" }, { id: "assignments", icon: "📚", label: "Tasks" }, { id: "analytics", icon: "📊", label: "Progress" }, { id: "settings", icon: "⚙", label: "Settings" }]
    : role === "admin"
    ? [{ id: "admin", icon: "⚙️", label: "Admin" }, { id: "roster", icon: "👥", label: "Students" }, { id: "analytics", icon: "📊", label: "Reports" }, { id: "settings", icon: "⚙", label: "Settings" }]
    : [{ id: "roster", icon: "👥", label: "Roster" }, { id: "dashboard", icon: "⊞", label: "Schedule" }, { id: "analytics", icon: "📊", label: "Reports" }, { id: "notes", icon: "📝", label: "Notes" }];

  return (
    <div style={{ fontFamily: "'DM Sans', system-ui, sans-serif", background: "#F8F9FB", minHeight: "100vh", display: "flex", flexDirection: isMobile ? "column" : "row" }}>
      {showOnboarding && <OnboardingModal onDone={() => setShowOnboarding(false)} />}
      {!isMobile && <Sidebar role={role} activePage={page} onNavigate={p => setPage(p)} user={currentUser} onLogout={async () => { await signOutUser(); setSessionUser(null); setProfile(null); setRole(null); setPage("dashboard"); }} collapsed={collapsed} setCollapsed={setCollapsed} />}
      <div style={{ flex: 1, overflow: "auto", paddingBottom: isMobile ? 64 : 0 }}>
        <div style={{ height: isMobile ? 56 : 52, borderBottom: "1px solid #E8EAF0", background: "#FFFFFF", display: "flex", alignItems: "center", justifyContent: "space-between", padding: isMobile ? "0 14px" : "0 18px", position: "sticky", top: 0, zIndex: 5 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            {!isMobile && <button onClick={() => setCollapsed(!collapsed)} style={{ width: 34, height: 34, borderRadius: 9, border: `1px solid ${UA.border}`, background: "white", cursor: "pointer", fontSize: 16 }}>☰</button>}
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, color: UA.text }}>{page === "studentProfile" ? "Student Profile" : page.charAt(0).toUpperCase() + page.slice(1)}</div>
              <div style={{ fontSize: 11, color: UA.textMuted }}>{role === "student" ? "Student Portal" : role === "admin" ? "Administration" : "Staff Workspace"}</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ fontSize: 12, color: UA.textMuted, padding: "6px 10px", borderRadius: 999, background: UA.bg, border: `1px solid ${UA.border}` }}>{sessionUser.email}</div>
            <button onClick={async () => { await signOutUser(); setSessionUser(null); setProfile(null); setRole(null); setPage("dashboard"); }} style={{ padding: "8px 12px", borderRadius: 8, border: `1px solid ${UA.border}`, background: "white", cursor: "pointer", fontFamily: "inherit", fontWeight: 600, color: UA.textSecondary }}>Sign out</button>
          </div>
        </div>
        {backendBanner}
        <div style={{ padding: isMobile ? 12 : 20 }}>{renderPage()}</div>
      </div>
      {isMobile && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, height: 64, background: "white", borderTop: `1px solid ${UA.border}`, display: "grid", gridTemplateColumns: `repeat(${mobileNav.length}, 1fr)`, zIndex: 20 }}>
          {mobileNav.map(item => {
            const active = page === item.id;
            return (
              <button key={item.id} onClick={() => setPage(item.id)} style={{ border: "none", background: active ? UA.redLight : "white", color: active ? UA.red : UA.textMuted, fontFamily: "inherit", fontSize: 11, fontWeight: active ? 700 : 500, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 4 }}>
                <span style={{ fontSize: 18 }}>{item.icon}</span>{item.label}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
