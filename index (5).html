const greet=()=>{const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening";};
const sid=s=>(s&&(s.students||s.id))||"";

function meta(a){
  const due=a.due_date?new Date(a.due_date+"T12:00:00"):null;
  const ov=!!(due&&due<new Date()&&a.status!=="completed");
  const days=due?Math.round((due.getTime()-Date.now())/86400000):null;
  const lbl=!due?"No due date":ov?`${Math.abs(days||0)}d overdue`:days===0?"Due today":days===1?"Due tomorrow":`Due ${due.toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
  return {due,isOverdue:ov,days,dueLabel:lbl};
}

async function callAI(prompt,ms=13000){
  const ctrl=new AbortController(),t=setTimeout(()=>ctrl.abort(),ms);
  try{
    const r=await fetch(`${SB_URL}/functions/v1/ai-breakdown-`,{
      method:"POST",
      headers:{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`},
      body:JSON.stringify({assignment:{title:"AI"},prompt:{question:"ai",aiPrompt:prompt}}),
      signal:ctrl.signal,
    });
    clearTimeout(t);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const d=await r.json();return d.text||d.message||"";
  }catch(e){clearTimeout(t);console.error("AI:",e?.message);throw e;}
}

// Resolve Cornelius's id from the live roster once, cache it.
let _demoCorneliusId=null;
async function demoCorneliusId(){
  if(_demoCorneliusId) return _demoCorneliusId;

    const{data}=await sb.from("students").select("*");

    _demoCorneliusId = c?(c.students||c.id):"demo-cornelius";
  }catch{ _demoCorneliusId="demo-cornelius"; }
  return _demoCorneliusId;
}

const demoSessionsByStudent = {};
demoMonitorSessions.forEach(s=>{ (demoSessionsByStudent[s.student_id]=demoSessionsByStudent[s.student_id]||[]).push(s); });

const isDemoStudent = (id)=>typeof id==="string" && id.startsWith("demo-sh-");

// Wrap live data functions when demo mode is on.
if(DEMO_ON){
  const _getAllStudents=getAllStudents;
  getAllStudents=async()=>{
    const live=await _getAllStudents();
    const merged=[...live];
    demoMonitorStudents.forEach(ds=>{ if(!merged.find(s=>sid(s)===ds.students)) merged.push(ds); });
    return merged;
  };

  const _getStudent=getStudent;
  getStudent=async(uid)=>{
    if(isDemoStudent(uid)) return demoStudentById[uid]||null;
    return _getStudent(uid);
  };

  const _getAllSessions=getAllSessions;
  getAllSessions=async(lim=100)=>{
    const live=await _getAllSessions(lim);
    return [...demoMonitorSessions,...live];
  };

  const _getSessions=getSessions;
  getSessions=async(s,lim=20)=>{
    if(isDemoStudent(s)) return (demoSessionsByStudent[s]||[]).slice(0,lim);
    return _getSessions(s,lim);
  };

  const _getNotes=getNotes;
  getNotes=async(s)=>{
    if(isDemoStudent(s)) return demoNotesByStudent[s]||[];
    return _getNotes(s);
  };

  const _getAssignment=getAssignment;
  getAssignment=async(id)=>{
    if(typeof id==="string" && id.startsWith("dsa-")){
      for(const arr of Object.values(demoAssignmentsByStudent)){
        const found=arr.find(a=>a.id===id);
        if(found) return {...found,...meta(found)};
      }
    }
    return _getAssignment(id);
  };

  const _getAssignments=getAssignments;
  getAssignments=async(studentId)=>{
    if(isDemoStudent(studentId)){
      return (demoAssignmentsByStudent[studentId]||[]).map(a=>({...a,...meta(a)}));
    }
    const live=await _getAssignments(studentId);
    const cid=await demoCorneliusId();
    if(studentId===cid){
      return [...demoMathAssignments(studentId).map(a=>({...a,...meta(a)})), ...live];
    }
    return live;
  };

  const _getAllAssignments=getAllAssignments;
  getAllAssignments=async()=>{
    const live=await _getAllAssignments();
    const cid=await demoCorneliusId();
    return [...demoMathAssignments(cid).map(a=>({...a,...meta(a)})), ...live];
  };
}

// AI reads the assignment, identifies concepts, builds a visual mini-lesson.
// Lesson types: timeline, figures, concepts, comparison, diagram, process
// Images: pulled from Wikipedia REST API for real photos

async function wikiImage(term){
  if(!term) return null;
  // Normalize: hyphens and spaces → underscores (Wikipedia REST API requirement)
  const base=term.replace(/[\s\-]+/g,"_");
  // Try multiple slug candidates — AI often appends disambiguation suffixes
  const candidates=[
    base,
    base.replace(/_Jr\.?$/i,""),
    base.replace(/_(politician|activist|musician|leader|civil_rights)$/i,""),
    base.replace(/_\d{4}$/,""),
  ].filter((s,i,a)=>s.length>1&&a.indexOf(s)===i);
  for(const slug of candidates){
    try{
      const r=await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(slug)}`,{headers:{"Accept":"application/json"}});
      if(!r.ok) continue;
      const d=await r.json();
      if(d.thumbnail?.source) return d.thumbnail.source;
    }catch{}
  }
  return null;
}

// ── MAIN TEACH ME PANEL ───────────────────────────────────────────────────────
function TeachMePanel({assignment:a,onClose}){
  const[lesson,setLesson]=useState(null);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState(false);

  // Robust JSON cleaner — handles unescaped quotes, newlines, truncated strings
  // Parse structured text from AI — pipe-delimited, no JSON needed
  // Format: TITLE: ... / HOOK: ... / ##TYPE: Title / col1|col2|col3
  function parseLessonText(raw){
    const lines=raw.split("\n").map(l=>l.trim()).filter(Boolean);
    const lesson={title:"Visual Lesson",hook:"",cards:[]};
    let cur=null;

    // Flexible section header matcher — handles ##TIMELINE:, ## TIMELINE:,
    // ### Timeline:, TIMELINE:, **TIMELINE**, - TIMELINE, etc.
    function matchSection(line){
      // Strip leading #, *, -, spaces, then check keyword
      const clean=line.replace(/^[#*\->\s]+/,"").replace(/[*_]+/g,"").replace(/:/,"").trim().toUpperCase();
      if(clean==="TIMELINE"||clean.startsWith("TIMELINE ")) return "TIMELINE";
      if(clean==="FIGURES"||clean.startsWith("FIGURES "))   return "FIGURES";
      if(clean==="CONCEPTS"||clean.startsWith("CONCEPTS ")) return "CONCEPTS";
      if(clean==="PROCESS"||clean.startsWith("PROCESS "))   return "PROCESS";
      if(clean==="DIAGRAM"||clean.startsWith("DIAGRAM "))   return "DIAGRAM";
      if(clean==="COMPARE"||clean.startsWith("COMPARE ")||clean.startsWith("COMPARISON ")) return "COMPARE";
      if(clean==="SOURCES"||clean.startsWith("SOURCES ")||clean.startsWith("SOURCE ")) return "SOURCES";
      return null;
    }

    // Extract section title after keyword (e.g. "##TIMELINE: Key Events" → "Key Events")
    function sectionTitle(line){
      return line.replace(/^[#*\->\s]+/,"").replace(/^[A-Z]+[A-Za-z\s]*:?\s*/,"").replace(/[*_]+/g,"").trim()||"";
    }

    for(const line of lines){
      // Metadata lines
      if(/^TITLE\s*:/i.test(line))  {lesson.title=line.replace(/^TITLE\s*:\s*/i,"").trim();continue;}
      if(/^HOOK\s*:/i.test(line))   {lesson.hook =line.replace(/^HOOK\s*:\s*/i,"").trim();continue;}

      // Section headers — must start with #, *, -, or be ALL CAPS keyword
      const isHeader=line.startsWith("#")||line.startsWith("*")||line.startsWith("-")||/^[A-Z]{4,}/.test(line);
      if(isHeader){
        const sec=matchSection(line);
        if(sec==="TIMELINE") {cur={type:"timeline",  title:sectionTitle(line),events:[]};lesson.cards.push(cur);continue;}
        if(sec==="FIGURES")  {cur={type:"figures",   title:sectionTitle(line),people:[]};lesson.cards.push(cur);continue;}
        if(sec==="CONCEPTS") {cur={type:"concepts",  title:sectionTitle(line),items:[]};lesson.cards.push(cur);continue;}
        if(sec==="PROCESS")  {cur={type:"process",   title:sectionTitle(line),steps:[]};lesson.cards.push(cur);continue;}
        if(sec==="DIAGRAM")  {cur={type:"diagram",   title:sectionTitle(line),center:"",nodes:[]};lesson.cards.push(cur);continue;}
        if(sec==="COMPARE")  {cur={type:"comparison",title:sectionTitle(line),left:{label:"",points:[]},right:{label:"",points:[]},shared:[]};lesson.cards.push(cur);continue;}
        if(sec==="SOURCES")  {cur={type:"sources",   title:sectionTitle(line)||"Where to Learn More",items:[]};lesson.cards.push(cur);continue;}
      }

      // Data rows
      if(!cur) continue;

      // Handle pipe-delimited rows
      if(line.includes("|")){
        const p=line.replace(/^\|/,"").replace(/\|$/,"").split("|").map(x=>x.trim()).filter(Boolean);
        if(!p.length) continue;
        if(cur.type==="timeline"&&p.length>=2) cur.events.push({date:p[0],event:p[1],detail:p[2]||""});
        else if(cur.type==="figures"&&p.length>=2){
          // Normalize wiki slug: spaces and hyphens → underscores, strip trailing punctuation
          const rawSlug=(p[3]||"").trim();
          cur.people.push({name:p[0],role:p[1],fact:p[2]||"",wiki:rawSlug});
        }
        else if(cur.type==="concepts"&&p.length>=2) cur.items.push({term:p[0],meaning:p[1],why:p[2]||"",example:p[3]||""});
        else if(cur.type==="process"&&p.length>=2)  cur.steps.push({label:p[0],detail:p[1],example:p[2]||""});
        else if(cur.type==="diagram"){
          if(!cur.center){cur.center=p[0];cur.subtitle=p[1]||"";}
          else cur.nodes.push({label:p[0],detail:p[1]||"",example:p[2]||""});
        }
        else if(cur.type==="comparison"){
          if(!cur.left.label){cur.left.label=p[0];cur.right.label=p[1]||"";}
          else if(/^(shared|both)/i.test(p[0])) cur.shared.push(p[1]||p[0]);
          else{cur.left.points.push(p[0]);if(p[1])cur.right.points.push(p[1]);}
        }
        else if(cur.type==="sources"&&p.length>=2) cur.items.push({name:p[0],url:p[1],why:p[2]||""});
      }
      // Handle non-pipe rows inside sections (numbered lists, bullet points)
      else if(cur.type==="timeline"){
        // Try to parse "1954 — Brown v. Board" or "1954: Brown v. Board"
        const m=line.match(/^(\d{4}[^|]*?)\s*[—\-:]\s*(.+)/);
        if(m) cur.events.push({date:m[1].trim(),event:m[2].trim(),detail:""});
      }
      else if(cur.type==="concepts"){
        // Try "**Term**: Definition"
        const m=line.match(/^\*{0,2}([^*:]+)\*{0,2}\s*[:\-]\s*(.+)/);
        if(m) cur.items.push({term:m[1].trim(),meaning:m[2].trim(),why:"",example:""});
      }
      else if(cur.type==="process"){
        // Numbered list: "1. Do this thing"
        const m=line.match(/^(?:\d+[.)]\s*|\-\s*)(.+)/);
        if(m) cur.steps.push({label:m[1].trim(),detail:"",example:""});
      }
    }
    return lesson;
  }

  async function buildLesson(){
    setLoading(true);setError(false);setLesson(null);
    const title=(a?.title||"").replace(/[|]/g,"").slice(0,80);
    const course=(a?.course_code||a?.course||"").slice(0,40);
    const instr=(a?.instructions||a?.description||"No details")
      .replace(/[|]/g,"-").replace(/[\r\n\t]/g," ").replace(/\s+/g," ").slice(0,350);

    const prompt=`You are a professor teaching this topic to a college student. Create a structured visual lesson that helps a visual learner understand the core concepts.

Assignment: ${title}
Course: ${course}
Content: ${instr}

OUTPUT FORMAT — use exactly this format, nothing else:

TITLE: [lesson title]
HOOK: [one engaging sentence that makes the student curious]

##TIMELINE: [title] — use for history, sequences, chronology
date | event name | why it mattered (one sentence)
[3-5 entries]

##FIGURES: [title] — use for key people
full name | their role | one key fact about them | WikipediaArticleSlug
[2-4 people]

##CONCEPTS: [title] — use for key terms and ideas
term | plain-English definition | why it matters for THIS assignment | real example
[3-5 terms]

##PROCESS: [title] — use for steps, cycles, how things work
step name | what happens in this step | concrete example
[3-5 steps]

##DIAGRAM: [title] — use for systems, structures, anatomy
central concept | brief description
part name | what it does | example
[3-5 parts]

##COMPARE: [title] — use for two contrasting things
left label | right label
left point | right point
[3-5 pairs]
shared | something both have in common

##SOURCES: Where to Learn More
source name | full URL | what you will find there
[2-3 real sources — Khan Academy, Wikipedia, Britannica, etc.]

CRITICAL FORMAT RULES:
- Section headers MUST start with ## followed by the keyword, like: ##TIMELINE: Key Dates
- Wikipedia slugs use underscores not hyphens: Martin_Luther_King_Jr not Martin-Luther-King-Jr
- Use pipe | to separate columns ONLY — never inside your text values
- Choose 2-3 section types that best fit this subject
- Always end with ##SOURCES: Where to Learn More
- Keep each row under 120 characters
- Use real facts, real names, real dates`;

    try{
      const raw=await callAI(prompt,16000);
      const parsed=parseLessonText(raw);
      if(!parsed.cards||parsed.cards.length===0) throw new Error("no cards parsed");
      // Always ensure a sources card exists — use subject lookup if AI didn't include one
      const hasSources=parsed.cards.some(c=>c.type==="sources");
      if(!hasSources){
        parsed.cards.push({
          type:"sources",
          title:"Credible Sources for This Assignment",
          items:getSubjectSources(a)
        });
      }else{
        // Merge AI sources with subject lookup (AI sources first, then fill remaining slots)
        const srcCard=parsed.cards.find(c=>c.type==="sources");
        const fallback=getSubjectSources(a);
        const existing=new Set((srcCard.items||[]).map(s=>s.name.toLowerCase()));
        const extras=fallback.filter(s=>!existing.has(s.name.toLowerCase()));
        srcCard.items=[...(srcCard.items||[]),...extras.slice(0,2)];
      }
      setLesson(parsed);
    }catch(e){
      console.error("TeachMe error:",e?.message);
      setError(true);
    }
    setLoading(false);
  }

  useEffect(()=>{buildLesson();},[]);

        <button onClick={onClose} style={{background:"rgba(255,255,255,.12)",border:"none",cursor:"pointer",width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,color:"#fff"}}>✕</button>
      </div>

        {error&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:280,gap:14}}>

          <div style={{fontSize:14,color:UA.text,textAlign:"center",fontWeight:600}}>Couldn't build the lesson right now</div>

        </div>}

        {lesson&&!loading&&<div style={{animation:"fadeInUp .35s"}}>

          </div>

          {(lesson.cards||[]).map((card,i)=>renderLessonCard(card,i))}
          {/* Done CTA */}
          <div style={{marginTop:8,padding:"14px 18px",background:UA.greenBg,border:`1px solid ${UA.greenBd}`,borderRadius:11,textAlign:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:UA.green,marginBottom:3}}>Lesson complete ✓</div>
            <div style={{fontSize:12,color:UA.green,opacity:.8}}>Ready to start working? Open Work Mode to apply what you just learned.</div>
          </div>
        </div>}
      </div>

      {/* Footer */}
      <div style={{padding:"10px 20px",borderTop:`1px solid ${UA.border}`,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontSize:11,color:UA.muted}}>Use <b style={{color:UA.navy}}>Ask the Coach</b> for specific questions</div>
        <button onClick={buildLesson} disabled={loading} style={{fontSize:11,fontWeight:600,padding:"5px 12px",borderRadius:8,border:`1px solid ${UA.border}`,background:"#fff",color:UA.muted,cursor:"pointer",opacity:loading?.5:1}}>↺ Rebuild</button>

}

// ─── COACH PANEL ─────────────────────────────────────────────────────────────
// Philosophy: actually help students learn. Give real facts, real starter
// sentences, real suggestions — then briefly show them how to make it their own.
// Never refuse. Never lecture. Be the knowledgeable tutor who gets them started.

function CoachPanel({assignment:a,onClose,onInsert,draft=""}){
  const draftWords=draft.trim()?draft.trim().split(/\s+/).length:0;
  const[msgs,setMsgs]=useState([
    {r:"coach",c:draftWords>0?`I'm your tutor for "${a?.title||"this assignment"}". I can see your draft (${draftWords} word${draftWords!==1?"s":""} so far) — ask me to review it, give you feedback, or help you develop any part of it. I can also give you facts, starter sentences, or structure help.`:`I'm your tutor for "${a?.title||"this assignment"}". Ask me anything — facts about the topic, starter sentences, how to structure your response, or what a concept means. I'll give you real answers and help you understand what you're writing.`}
  ]);
  const[input,setInput]=useState("");
  const[busy,setBusy]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"});},[msgs]);

  // Detect if a message contains insertable content (sentences, bullet lists, etc.)
  function hasInsertable(text){
    return text.length>80&&(text.includes(".")||text.includes(":"));
  }

  async function send(){
    if(!input.trim()||busy)return;
    const q=input.trim();
    setMsgs(p=>[...p,{r:"user",c:q}]);
    setInput("");setBusy(true);

    const ctx=`Assignment: "${a?.title||""}" | Course: ${a?.course_code||a?.course||""} | What it covers: ${(a?.instructions||a?.description||"").replace(/"/g,"'").slice(0,250)}`;
    const hist=msgs.slice(-6).map(m=>`${m.r==="user"?"Student":"Tutor"}: ${m.c}`).join("\n");

    const hasDraft=draft.trim().length>10;
    const draftCtx=hasDraft?`\n\nSTUDENT'S CURRENT DRAFT (${draftWords} words):\n"${draft.slice(0,1200)}${draft.length>1200?"... [draft continues]":""}`:"";
    const systemPrompt=`You are a knowledgeable academic tutor helping a college student-athlete complete their assignment. Your job is to ACTUALLY HELP them understand and make progress.

RULES:
1. When asked for facts — give real, accurate, specific facts about the topic immediately
2. When asked for starter sentences — provide 2-3 actual complete sentences they can use right now, then explain how to expand each one
3. When asked to review or give feedback on their draft — read it carefully and give specific, line-level feedback: what is working, what is weak, what is missing
4. When asked what something means — explain clearly in plain language with a real example
5. When asked for a word count breakdown — give specific numbers and structure guidance
6. Never say "look it up yourself" — if they need information, give it
7. Never lecture about academic integrity — not your role
8. After giving help, add ONE brief note (1 sentence max) on how to make it their own
9. Format starter sentences on their own lines so they are easy to copy
10. When referencing their draft, quote the specific part you are responding to

Think of yourself as a brilliant friend who knows this subject and genuinely wants to help.${draftCtx}`;

    try{
      const res=await callAI(`${systemPrompt}\n\nAssignment: ${ctx}\n\nConversation:\n${hist}\n\nStudent: ${q}\n\nTutor:`);
      setMsgs(p=>[...p,{r:"coach",c:res,insertable:hasInsertable(res)}]);
    }catch{
      setMsgs(p=>[...p,{r:"coach",c:"Sorry, I couldn't connect right now. Try again in a moment."}]);
    }
    setBusy(false);
  }

  // Quick-action chips for common requests
  const chips=draftWords>30?[
    "Review what I have so far",
    "What am I missing?",
    "Make my opening stronger",
    "Give me 3 starter sentences for the next section",
    "What are the key facts I need?",
  ]:[
    "Give me 3 starter sentences",
    `What is ${(a?.title||"this topic").split(":")[0].split("\u2014")[0].trim().split(" ").slice(0,4).join(" ")}?`,
    "How should I structure this?",
    "What are the key facts I need?",
    "Give me a word count breakdown",
  ];

  return <>
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.25)",zIndex:50}} onClick={onClose}/>
    <div style={{position:"fixed",top:0,right:0,bottom:0,width:420,maxWidth:"92vw",background:"#fff",borderLeft:`1px solid ${UA.border}`,zIndex:51,display:"flex",flexDirection:"column",animation:"slideRight .25s ease-out",boxShadow:"-12px 0 40px rgba(0,0,0,.12)"}}>

      {/* Header */}
      <div style={{padding:"12px 16px",borderBottom:`1px solid ${UA.border}`,background:UA.navyLight,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:999,background:UA.navy,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#fff",fontWeight:700}}>✦</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:UA.navy}}>AI Tutor</div>
            <div style={{fontSize:10,color:UA.muted}}>Asks answered · Sentences provided · Facts given</div>
          </div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:UA.muted}}>✕</button>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 14px 8px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=><div key={i} style={{display:"flex",flexDirection:"column",alignItems:m.r==="user"?"flex-end":"flex-start",gap:5}}>
          <div style={{maxWidth:"92%",padding:"10px 13px",borderRadius:m.r==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.r==="user"?UA.navy:"#F1F3F8",color:m.r==="user"?"#fff":UA.text,fontSize:13,lineHeight:1.7,border:m.r!=="user"?`1px solid ${UA.border}`:"none",whiteSpace:"pre-wrap"}}>
            {m.c}
          </div>
          {/* Insert to draft button for coach messages with usable content */}
          {m.r==="coach"&&m.insertable&&onInsert&&<button onClick={()=>{onInsert(m.c);}} style={{alignSelf:"flex-start",fontSize:11,fontWeight:700,padding:"4px 11px",borderRadius:7,border:`1.5px solid ${UA.navyBd}`,background:UA.navyLight,color:UA.navy,cursor:"pointer",marginLeft:2}}>→ Add to draft</button>}
        </div>)}

        <div ref={endRef}/>

      {/* Quick chips */}
      {msgs.length<=1&&<div style={{padding:"4px 14px 10px",display:"flex",gap:6,flexWrap:"wrap",flexShrink:0}}>
        {chips.map((c,i)=><button key={i} onClick={()=>{setInput(c);}} style={{fontSize:11,fontWeight:600,padding:"5px 11px",borderRadius:99,border:`1px solid ${UA.border}`,background:"#fff",color:UA.textMuted||UA.muted,cursor:"pointer",whiteSpace:"nowrap"}}>{c}</button>)}
      </div>}

      {/* Input */}
      <div style={{padding:"10px 12px",borderTop:`1px solid ${UA.border}`,display:"flex",gap:8,flexShrink:0,background:"#fff"}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Ask anything about this assignment…" style={{flex:1,padding:"9px 13px",borderRadius:9,border:`1.5px solid ${UA.border}`,fontSize:13,outline:"none",color:UA.text}} onFocus={e=>e.target.style.borderColor=UA.navy} onBlur={e=>e.target.style.borderColor=UA.border}/>
        <button onClick={send} disabled={busy||!input.trim()} style={{padding:"9px 15px",borderRadius:9,border:"none",background:UA.navy,color:"#fff",fontSize:13,fontWeight:700,cursor:input.trim()&&!busy?"pointer":"default",opacity:input.trim()&&!busy?1:.5}}>Send</button>
      </div>
    </div>
  </>;
}

// ─── OUTREACH MODAL ───────────────────────────────────────────────────────────
function OutreachModal({student:s,context,assignments:asgns=[],onClose}){
  const[tone,setTone]=useState("check-in");
  const[draft,setDraft]=useState("");
  const[loading,setLoading]=useState(false);
  const[copied,setCopied]=useState(false);
  const TONES=[{id:"check-in",l:"Check-in"},{id:"urgent",l:"Urgent"},{id:"supportive",l:"Supportive"}];
  const GUIDE={"check-in":"warm, casual, low-pressure","urgent":"direct, time-sensitive, clear action needed","supportive":"empathetic, encouraging, concrete help"};
  useEffect(()=>{if(s)gen();},[s?.id,tone]);
  useEffect(()=>{const h=e=>{if(e.key==="Escape")onClose();};document.addEventListener("keydown",h);return()=>document.removeEventListener("keydown",h);},[]);
  async function gen(){
    setLoading(true);setDraft("");
    const od=asgns.filter(a=>a.isOverdue&&a.status!=="completed").map(a=>a.title);
    const ctx=`${od.length?`Overdue: ${od.join(", ")}. `:""}${asgns.filter(a=>a.status!=="completed").length} open assignments. ${context||""}`;
    try{const r=await callAI(`Write a 3-5 sentence outreach message from a learning specialist to a student-athlete. Tone: ${GUIDE[tone]}.\nStudent: ${s?.full_name} (${s?.sport}, ${s?.year}, GPA ${s?.gpa||"?"})\nContext: ${ctx}\nSign off as "Elias" from CATS Academic. Under 90 words. No subject line.`);setDraft(r);}catch{setDraft("");}setLoading(false);
  }
  async function copy(){if(!draft)return;await navigator.clipboard.writeText(draft);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.38)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:"#fff",borderRadius:18,width:"100%",maxWidth:500,display:"flex",flexDirection:"column",maxHeight:"85vh",boxShadow:"0 24px 64px rgba(0,0,0,.2)"}}>
      <div style={{padding:"16px 20px",borderBottom:`1px solid ${UA.border}`,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}><Av name={s?.full_name||""} size={30} color={UA.navy}/><div style={{fontSize:14,fontWeight:700,color:UA.text}}>Draft Outreach · {s?.full_name}</div></div>
        <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:UA.muted}}>✕</button>
      </div>
      <div style={{padding:20,overflowY:"auto",flex:1}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:UA.muted,marginBottom:8}}>Tone</div>
        <div style={{display:"flex",gap:6,marginBottom:18}}>{TONES.map(t=><button key={t.id} onClick={()=>setTone(t.id)} style={{flex:1,padding:"8px 0",borderRadius:9,fontSize:12,fontWeight:700,border:`1.5px solid ${tone===t.id?UA.navy:UA.border}`,background:tone===t.id?UA.navyLight:"#fff",color:tone===t.id?UA.navy:UA.muted,cursor:"pointer"}}>{t.l}</button>)}</div>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:UA.muted,marginBottom:8}}>Draft</div>
        <div style={{borderRadius:10,padding:14,background:UA.bg,border:`1px solid ${UA.border}`,fontSize:13,lineHeight:1.75,color:UA.text,minHeight:140,whiteSpace:"pre-wrap"}}>
          {loading?<div style={{display:"flex",flexDirection:"column",gap:8}}>{[1,.8,.6].map((o,i)=><div key={i} style={{height:11,borderRadius:4,background:UA.border,opacity:o}}/>)}</div>:draft||"Draft will appear here."}
        </div>
        <div style={{fontSize:11,fontStyle:"italic",marginTop:10,color:UA.muted}}>Always review before sending. AI drafts are a starting point.</div>
      </div>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end",padding:"12px 20px",borderTop:`1px solid ${UA.border}`,flexShrink:0}}>
        <button onClick={onClose} style={{padding:"9px 18px",borderRadius:9,border:`1px solid ${UA.border}`,background:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",color:UA.muted}}>Cancel</button>
        <button onClick={gen} disabled={loading} style={{padding:"9px 18px",borderRadius:9,border:"none",background:UA.bg,fontSize:13,fontWeight:700,cursor:"pointer",color:UA.text}}>Regenerate</button>
        <button onClick={copy} disabled={!draft||loading} style={{padding:"9px 18px",borderRadius:9,border:"none",background:UA.navy,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",opacity:draft&&!loading?1:.5}}>{copied?"Copied ✓":"Copy"}</button>
      </div>
    </div>
  </div>;
}

// ─── STAFF HOME ───────────────────────────────────────────────────────────────
function StaffHome({user,go}){
  const[students,setStudents]=useState([]);
  const[assigns,setAssigns]=useState([]);
  const[sessions,setSessions]=useState([]);
  const[sums,setSums]=useState({});
  const[sumLoad,setSumLoad]=useState(false);
  const[outreach,setOutreach]=useState(null);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{(async()=>{
    const[s,a,sess]=await Promise.all([getAllStudents(),getAllAssignments(),getAllSessions()]);
    setStudents(s);setAssigns(a);setSessions(sess);setLoading(false);
    genSums(s,a);
  })();},[]);

  async function genSums(studs,asgns){
    setSumLoad(true);
    try{
      const snap=studs.map(s=>{const id=sid(s);const sa=asgns.filter(a=>a.student_id===id);return{name:s.full_name,sport:s.sport,risk:s.risk_level,score:s.risk_score||50,overdue:sa.filter(a=>a.isOverdue).length,incomplete:sa.filter(a=>a.status!=="completed").length};});
      const r=await callAI(`For each student-athlete, write a 1-2 sentence academic summary. Grounded ONLY in data. Return JSON array only: [{"name":"...","text":"..."}]\n\n${JSON.stringify(snap)}`,16000);
      try{const p=JSON.parse(r.replace(/```json|```/g,"").trim());const m={};studs.forEach((s,i)=>{const id=sid(s);const e=p[i]||p.find(x=>x.name===s.full_name);if(e)m[id]=e.text;});setSums(m);}catch{}
    }catch{}
    setSumLoad(false);
  }

  function getSignals(s){
    const id=sid(s);const sa=assigns.filter(a=>a.student_id===id);
    const od=sa.filter(a=>a.isOverdue&&a.status!=="completed").length;
    const inc=sa.filter(a=>a.status!=="completed").length;
    const lo=s.avg_effort>0&&s.avg_effort<2.6;
    const sigs=[];
    if(od>0)sigs.push({icon:"⚠",text:`${od} overdue assignment${od>1?"s":""}`});
    else if(inc>0)sigs.push({icon:"→",text:`${inc} assignment${inc>1?"s":""} still open`});
    if(lo)sigs.push({icon:"↓",text:"Work Mode engagement below target"});
    else if(s.avg_effort>=3.8)sigs.push({icon:"↑",text:"Strong engagement in sessions"});
    else sigs.push({icon:"→",text:"Session engagement holding steady"});
    if(s.risk_level==="high")sigs.push({icon:"⚑",text:"Risk trending up — outreach recommended"});
    else if(s.risk_level==="low")sigs.push({icon:"✓",text:"All assignments on track"});
    else sigs.push({icon:"→",text:"GPA near eligibility threshold"});
    return sigs.slice(0,3);
  }

  if(loading)return <PL/>;
  const high=students.filter(s=>s.risk_level==="high");
  const todayStr=new Date().toISOString().split("T")[0];
  const inSH=new Set(sessions.filter(l=>(l.created_at||"").split("T")[0]===todayStr).map(l=>l.student_id)).size;
  const sorted=[...students].sort((a,b)=>({high:0,medium:1,low:2}[a.risk_level]-{high:0,medium:1,low:2}[b.risk_level])||((b.risk_score||0)-(a.risk_score||0)));
  const stats=[
    {icon:"⚠",bg:UA.redLight,color:UA.red,val:high.length,label:"High risk"},
    {icon:"→",bg:UA.yellowBg,color:UA.yellow,val:students.filter(s=>s.risk_level==="medium").length,label:"Moderate"},
    {icon:"✓",bg:UA.greenBg,color:UA.green,val:students.filter(s=>s.risk_level==="low").length,label:"On track"},
    {icon:"📖",bg:UA.navyLight,color:UA.navy,val:inSH,label:"In study hall today"},
  ];
  return <div style={{padding:"20px 24px",maxWidth:1200,margin:"0 auto",display:"flex",flexDirection:"column",gap:16,paddingBottom:48}}>
    <div><div style={{fontSize:15,fontWeight:800,color:UA.text}}>{greet()}, {user?.full_name?.split(" ")[0]||"Elias"}</div><div style={{fontSize:11,color:UA.muted,marginTop:1}}>Learning Specialist · Caseload dashboard</div></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
      {stats.map((s,i)=><div key={i} style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:36,height:36,borderRadius:9,background:s.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>{s.icon}</div>
        <div><div style={{fontSize:24,fontWeight:800,lineHeight:1,color:s.color}}>{s.val}</div><div style={{fontSize:11,fontWeight:600,marginTop:3,color:UA.muted}}>{s.label}</div></div>
      </div>)}
    </div>
    {high.length>0&&<div style={{background:UA.redLight,border:`1px solid ${UA.redBd}`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
      <div style={{fontSize:13,fontWeight:700,color:UA.red}}>⚠ {high.length} athlete{high.length>1?"s":""} need immediate attention — outreach recommended</div>
      <button onClick={()=>setOutreach({...high[0],id:sid(high[0])})} style={{fontSize:11,fontWeight:700,padding:"6px 14px",borderRadius:8,border:`1px solid ${UA.navyBd}`,background:UA.navyLight,color:UA.navy,cursor:"pointer",whiteSpace:"nowrap"}}>Review now</button>
    </div>}
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}><div style={{fontSize:13,fontWeight:800,color:UA.text}}>Current caseload</div><div style={{fontSize:12,color:UA.muted}}>{students.length} athletes</div></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
      {sorted.map(s=>{const id=sid(s);return <SCard key={id||s.full_name} student={{...s,id}} signals={getSignals(s)} aiSummary={sums[id]} aiLoading={sumLoad} onOutreach={s=>setOutreach({...s,id:sid(s)})} onView={s=>go("student_detail",{studentId:sid(s)||s.id,studentData:{...s,id:sid(s)||s.id}})}/>;
      })}
    </div>
    {outreach&&<OutreachModal student={outreach} context="" assignments={assigns.filter(a=>a.student_id===outreach.id)} onClose={()=>setOutreach(null)}/>}
  </div>;
}

// ─── STUDENT DETAIL ───────────────────────────────────────────────────────────
function StudentDetail({studentId,studentData,go}){
  const[s,setS]=useState(studentData||null);

  const[sessions,setSessions]=useState([]);
  const[notes,setNotes]=useState([]);
  const[tab,setTab]=useState("overview");
  const[loading,setLoading]=useState(!studentData);
  const[newNote,setNewNote]=useState("");
  const[noteCat,setNoteCat]=useState("Session Note");
  const[aiText,setAiText]=useState("");
  const[aiLoad,setAiLoad]=useState(false);
  const[plan,setPlan]=useState("");
  const[planSaved,setPlanSaved]=useState(false);
  const[outreach,setOutreach]=useState(false);
  const CCLR={"Session Note":UA.navy,"Concern Flag":UA.red,"Follow-Up Required":UA.amber,"Intake Observation":UA.green};

  useEffect(()=>{(async()=>{
    const[a,n,sess]=await Promise.all([getAssignments(studentId),getNotes(studentId),getSessions(studentId)]);
    setAssigns(a);setNotes(n);setSessions(sess);

    else setPlan(studentData?.weekly_plan||"");
    setLoading(false);genAI(a,sess);
  })();},[studentId]);

  async function genAI(a,sess){
    if(!s&&!studentData)return;const st=s||studentData;setAiLoad(true);
    const od=a.filter(x=>x.isOverdue&&x.status!=="completed").map(x=>x.title);
    const ctx=`${od.length?`Overdue: ${od.join(", ")}. `:""}${a.filter(x=>x.status!=="completed").length} open. Effort ${(st.avg_effort||0).toFixed(1)}/5, understanding ${(st.avg_understanding||0).toFixed(1)}/5. Risk: ${st.risk_level} (${st.risk_score||50}).`;
    try{const r=await callAI(`Write a concise student summary for ${st.full_name} (${st.sport}, ${st.year}, GPA ${st.gpa||"?"}).\nContext: ${ctx}\nFormat:\n**Strengths:** ...\n**Concerns:** ...\n**Interventions:** (max 3 numbered)\n**Next steps:** one sentence\nKeep each to 1-2 sentences. Grounded in data only.`);setAiText(r);}
    catch{setAiText("");}setAiLoad(false);
  }

  async function addNote(){
    if(!newNote.trim())return;
    const n=await createNote({student_id:studentId,author:"Elias Ortega",author_initials:"EO",category:noteCat,text:newNote});
    setNotes(p=>[n,...p]);setNewNote("");
  }
  async function savePlan(){await sb.from("students").update({weekly_plan:plan}).eq("students",studentId);setPlanSaved(true);setTimeout(()=>setPlanSaved(false),2000);}
  async function hStatus(id,status){await updateAssign(id,{status});setAssigns(p=>p.map(a=>a.id===id?{...a,status}:a));}

  if(loading)return <PL/>;
  const st=s||studentData||{};
  const pd=assigns.filter(a=>a.isOverdue&&a.status!=="completed");
  const dw=assigns.filter(a=>!a.isOverdue&&a.status!=="completed"&&a.days!==null&&a.days<=7);
  const spC={high:{l:"High",c:UA.red,bg:UA.redLight},medium:{l:"Watch",c:UA.yellow,bg:UA.yellowBg},low:{l:"On track",c:UA.green,bg:UA.greenBg}}[st.risk_level]||{l:"—",c:UA.muted,bg:UA.bg};
  const tabs=["overview","assignments","sessions","notes"];

  return <div style={{padding:"20px 24px",maxWidth:1000,margin:"0 auto",paddingBottom:48}}>
    <div style={{fontSize:13,color:UA.muted,marginBottom:12}}>
      <button onClick={()=>go("roster")} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:UA.muted,padding:0}}>Roster</button>
      <span style={{margin:"0 6px"}}>›</span><span style={{color:UA.text,fontWeight:600}}>{st.full_name}</span>
    </div>
    <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <Av name={st.full_name} size={56} color={spC.c}/>
        <div><h1 style={{fontSize:22,fontWeight:800,color:UA.text,letterSpacing:"-.02em"}}>{st.full_name}</h1><p style={{fontSize:13,color:UA.muted,marginTop:4}}>{st.sport} · {st.year} · GPA {st.gpa||"—"} · Counselor: {st.counselor||"—"}</p></div>
      </div>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setOutreach(true)} style={{padding:"8px 14px",borderRadius:9,border:`1px solid ${UA.border}`,background:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",color:UA.text}}>Draft Outreach</button>
        <button onClick={()=>go("pstudyhall",{studentId,studentData:{...st,id:studentId}})} style={{padding:"8px 14px",borderRadius:9,border:"none",background:UA.navy,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Study Hall ▶</button>
      </div>
    </div>
    <nav style={{display:"flex",gap:2,borderBottom:`1px solid ${UA.border}`,marginBottom:20}}>
      {tabs.map(t=><button key={t} onClick={()=>setTab(t)} style={{padding:"9px 16px",fontSize:13,fontWeight:600,background:"none",border:"none",cursor:"pointer",color:tab===t?UA.navy:UA.muted,borderBottom:`2px solid ${tab===t?UA.navy:"transparent"}`,marginBottom:-1}}>{t.charAt(0).toUpperCase()+t.slice(1)}</button>)}
    </nav>

    {tab==="overview"&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
        {[{l:"Past due",v:pd.length,danger:pd.length>0,sub:`${new Set(pd.map(a=>a.course_code)).size} course(s)`},{l:"Due this week",v:dw.length,sub:dw.length?`Next: ${dw[0].days}d`:"None"},{l:"Last session",v:sessions.length?`${Math.max(0,Math.round((Date.now()-new Date(sessions[0].created_at))/86400000))}d`:"—",sub:sessions.length?new Date(sessions[0].created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"}):"No sessions"},{l:"Status",pill:spC.l,c:spC.c,bg:spC.bg,score:st.risk_score,sub:`Risk: ${st.risk_level||"?"}`}].map((si,i)=><div key={i} style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".04em",color:UA.muted,marginBottom:6}}>{si.l}</div>
          {si.pill?<div style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:99,background:si.bg,fontSize:11,fontWeight:700,color:si.c}}><span style={{width:5,height:5,borderRadius:"50%",background:si.c}}/>{si.pill} · {si.score||50}</div>
          :<div style={{fontSize:22,fontWeight:700,color:si.danger?UA.red:UA.text,letterSpacing:"-.02em"}}>{si.v}</div>}
          <div style={{fontSize:11,color:UA.muted,marginTop:4}}>{si.sub}</div>
        </div>)}
      </div>
      {pd.length>0&&<div style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:"16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}><div style={{fontSize:13,fontWeight:700,color:UA.text}}>Needs attention</div><span style={{fontSize:11,color:UA.muted}}>{pd.length} overdue</span></div>
        {pd.map((a,i)=><div key={a.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<pd.length-1?`1px solid ${UA.border}`:"none"}}>
          <div style={{width:3,alignSelf:"stretch",borderRadius:99,background:UA.red,flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600,color:UA.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title}</div><div style={{fontSize:11,color:UA.muted}}>{a.course_code||a.course} · {a.dueLabel} · {a.points||0} pts</div></div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,background:UA.redLight,color:UA.red,whiteSpace:"nowrap"}}>Overdue</span>
        </div>)}
      </div>}
      <div style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:"16px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><div style={{fontSize:13,fontWeight:700,color:UA.text}}>AI student summary</div><button onClick={()=>genAI(assigns,sessions)} disabled={aiLoad} style={{fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:8,border:`1px solid ${UA.border}`,background:"#fff",color:UA.muted,cursor:"pointer",opacity:aiLoad?.6:1}}>{aiLoad?"Generating…":"Regenerate"}</button></div>
        <div style={{background:UA.bg,border:`1px solid ${UA.border}`,borderRadius:9,padding:"12px 14px",fontSize:13,lineHeight:1.75,color:UA.text,minHeight:100,whiteSpace:"pre-wrap"}}>{aiLoad?"Generating…":aiText||"Summary will appear here."}</div>
      </div>
      <div style={{background:UA.navyLight,border:`1.5px solid ${UA.navyBd}`,borderRadius:12,padding:"16px 20px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div><div style={{fontWeight:700,fontSize:13,color:UA.navy}}>📋 This Week's Plan</div><div style={{fontSize:11,color:UA.muted,marginTop:2}}>Edit and save the weekly study plan</div></div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>{planSaved&&<span style={{fontSize:12,fontWeight:700,color:UA.green}}>✓ Saved</span>}<button onClick={savePlan} style={{padding:"7px 14px",borderRadius:8,background:UA.navy,color:"#fff",border:"none",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save Plan</button></div>
        </div>
        <textarea value={plan} onChange={e=>setPlan(e.target.value)} rows={4} placeholder={"Monday:\nTuesday:\nWednesday:\nThursday:\nFriday:"} style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${UA.navyBd}`,fontSize:13,lineHeight:1.7,resize:"vertical",outline:"none",background:"#fff"}}/>

    </div>}

    {tab==="assignments"&&<div style={{display:"flex",flexDirection:"column",gap:8}}>
      {assigns.length===0&&<Empty icon="📚" title="No assignments yet"/>}
      {assigns.map(a=><div key={a.id} style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>

        <select value={a.status} onChange={e=>hStatus(a.id,e.target.value)} style={{fontSize:11,fontWeight:700,padding:"5px 8px",borderRadius:8,border:`1.5px solid ${UA.border}`,background:"#fff",cursor:"pointer",outline:"none"}}>

        </select>
      </div>)}
    </div>}

    {tab==="sessions"&&<div style={{display:"flex",flexDirection:"column",gap:10}}>
      {sessions.length===0&&<Empty icon="📋" title="No sessions logged yet"/>}
      {sessions.filter(l=>l.notes!=="__live__").map(l=><div key={l.id} style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:6}}>
          <div><div style={{fontWeight:700,fontSize:13,color:UA.text}}>{l.assignment_title||"—"}</div><div style={{fontSize:11,color:UA.muted,marginTop:2}}>{l.created_at?new Date(l.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric"}):""} · {l.duration_minutes||0} min · {(l.completion_type||"in_progress").replace("_"," ")}</div></div>
          <div style={{display:"flex",gap:6}}>
            {[{l:"Effort",v:`${l.effort||0}/5`,ok:(l.effort||0)>=3},{l:"Understanding",v:`${l.understanding||0}/5`,ok:(l.understanding||0)>=3}].map((m,i)=><div key={i} style={{textAlign:"center",padding:"5px 10px",borderRadius:8,background:UA.bg,border:`1px solid ${UA.border}`}}><div style={{fontSize:9,fontWeight:700,textTransform:"uppercase",color:UA.muted}}>{m.l}</div><div style={{fontSize:14,fontWeight:800,color:m.ok?UA.green:UA.red}}>{m.v}</div></div>)}
          </div>
        </div>
        {l.notes&&<div style={{fontSize:12,padding:"8px 12px",borderRadius:8,background:UA.bg,borderLeft:`3px solid ${UA.navy}`,color:UA.sec,lineHeight:1.65,marginTop:6}}>{l.notes}</div>}

    {tab==="notes"&&<div style={{display:"flex",flexDirection:"column",gap:12}}>
      <div style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:"16px 20px"}}>
        <div style={{fontWeight:700,fontSize:13,color:UA.text,marginBottom:12}}>Add Note</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:10,marginBottom:10}}>
          <select value={noteCat} onChange={e=>setNoteCat(e.target.value)} style={{padding:"9px 12px",borderRadius:9,border:`1.5px solid ${UA.border}`,fontSize:13,outline:"none",background:"#fff"}}><option>Session Note</option><option>Concern Flag</option><option>Follow-Up Required</option><option>Intake Observation</option></select>
          <button onClick={addNote} disabled={!newNote.trim()} style={{padding:"9px 18px",borderRadius:9,background:UA.navy,color:"#fff",border:"none",fontSize:13,fontWeight:700,cursor:"pointer",opacity:newNote.trim()?1:.5}}>+ Add</button>
        </div>
        <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Document session observations, concerns, follow-up actions…" rows={3} style={{width:"100%",padding:"10px 12px",borderRadius:9,border:`1.5px solid ${UA.border}`,fontSize:13,lineHeight:1.65,resize:"none",outline:"none"}}/>
      </div>
      {notes.map(n=><div key={n.id} style={{background:"#fff",border:`1px solid ${UA.border}`,borderLeft:`4px solid ${CCLR[n.category]||UA.navy}`,borderRadius:12,padding:"14px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:9}}><Av name={n.author||"Staff"} size={28} color={UA.navy}/><div><div style={{fontSize:12,fontWeight:700,color:UA.text}}>{n.author||"Staff"}</div><div style={{fontSize:10,color:UA.muted}}>{n.created_at?new Date(n.created_at).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}):""}</div></div></div>
          <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,background:UA.navyLight,color:CCLR[n.category]||UA.navy,border:`1px solid ${UA.navyBd}`}}>{n.category}</span>
        </div>
        <p style={{fontSize:13,color:UA.sec,lineHeight:1.7,margin:0}}>{n.text}</p>
      </div>)}
      {notes.length===0&&<Empty icon="📝" title="No notes yet" sub="Add a note above after meeting with this student."/>}
    </div>}

    {outreach&&<OutreachModal student={{...st,id:studentId}} context="" assignments={assigns} onClose={()=>setOutreach(false)}/>}
  </div>;
}

// ─── STUDY HALL MONITOR ───────────────────────────────────────────────────────
function Monitor({go}){
  const[active,setActive]=useState([]);
  const[loading,setLoading]=useState(true);
  const[selId,setSelId]=useState(null);

  useEffect(()=>{
    const load=async()=>{
      const[logs,studs]=await Promise.all([getAllSessions(50),getAllStudents()]);
      const cut=Date.now()-24*3600000;
      const recent=logs.filter(l=>new Date(l.created_at).getTime()>cut);
      const by={};recent.forEach(l=>{if(!by[l.student_id])by[l.student_id]=[];by[l.student_id].push(l);});
      const list=Object.entries(by).map(([kid,slogs])=>{
        const stud=studs.find(s=>sid(s)===kid);if(!stud)return null;
        const live=slogs.find(l=>l.notes==="__live__"&&Date.now()-new Date(l.updated_at||l.created_at).getTime()<5*60000);
        const isLive=!!live;
        const completed=slogs.filter(l=>l.notes!=="__live__");
        const totalTime=live?live.time_seconds||0:completed.reduce((s,l)=>s+(l.time_seconds||l.duration_minutes*60||0),0);
        const latest=slogs[0];
        const eL=completed.filter(l=>l.effort>0);const uL=completed.filter(l=>l.understanding>0);
        const avgE=eL.length?(eL.reduce((s,l)=>s+l.effort,0)/eL.length).toFixed(1):null;
        const avgU=uL.length?(uL.reduce((s,l)=>s+l.understanding,0)/uL.length).toFixed(1):null;
        const needs=(avgE&&parseFloat(avgE)<2.5)||(avgU&&parseFloat(avgU)<2.5);
        return {student:{...stud,id:sid(stud)||stud.id},logs:slogs,latest,totalTime,isLive,avgE,avgU,needs};
      }).filter(Boolean).sort((a,b)=>(b.isLive-a.isLive)||(b.needs-a.needs));
      setActive(list);if(list.length&&!selId)setSelId(list[0].student.id);setLoading(false);
    };
    load();const iv=setInterval(load,30000);return()=>clearInterval(iv);
  },[]);

  if(loading)return <PL/>;
  const sel=active.find(a=>a.student.id===selId);
  const RC={high:UA.red,medium:UA.yellow,low:UA.green};

  return <div style={{padding:"20px 24px",maxWidth:1100,margin:"0 auto",paddingBottom:48}}>
    <div style={{marginBottom:16}}><h1 style={{fontSize:22,fontWeight:800,color:UA.text,letterSpacing:"-.02em"}}>Study Hall — Live</h1><p style={{fontSize:13,color:UA.muted,marginTop:4}}>Today's block · {new Date().toLocaleDateString("en-US",{weekday:"long"})} · refreshes every 30s</p></div>
    <div style={{display:"flex",alignItems:"baseline",gap:8,marginBottom:16}}><span style={{fontSize:32,fontWeight:700,color:UA.text,letterSpacing:"-.03em"}}>{active.filter(a=>a.isLive).length}</span><span style={{fontSize:13,color:UA.muted}}>active right now · {active.length} total today</span></div>
    {active.length===0?<div style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:14,padding:"60px 24px",textAlign:"center"}}><div style={{fontSize:36,marginBottom:10}}>📖</div><div style={{fontWeight:700,fontSize:15,color:UA.text}}>No study hall activity today</div><div style={{fontSize:13,color:UA.muted,marginTop:4}}>Students appear here as they log work.</div></div>
    :<div style={{display:"grid",gridTemplateColumns:"1fr 340px",gap:16,alignItems:"start"}}>
      <div>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:UA.muted,marginBottom:10}}>Sorted by concern level</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {active.map(({student:st,latest,totalTime,isLive,needs})=>{
            const sel_=selId===st.id;const top=RC[st.risk_level]||UA.green;
            return <button key={st.id} onClick={()=>setSelId(st.id)} style={{textAlign:"left",background:"#fff",border:`${sel_?2:1}px solid ${sel_?UA.navy:UA.border}`,borderLeft:`3px solid ${top}`,borderRadius:10,padding:"12px 13px",cursor:"pointer",width:"100%"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Av name={st.full_name} size={30} color={top}/><div style={{minWidth:0}}><div style={{fontSize:13,fontWeight:700,color:UA.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.full_name}</div><div style={{fontSize:11,color:UA.muted}}>{st.sport} · {st.year}</div></div></div>
              <div style={{fontSize:12,color:UA.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:2}}>{latest?.assignment_title||"Working…"}</div>
              <div style={{display:"flex",alignItems:"center",gap:8,paddingTop:8,borderTop:`1px solid ${UA.border}`,fontSize:11,color:UA.muted}}>
                <span>⏱ {Math.round(totalTime/60)||0}m</span>
                <span style={{marginLeft:"auto",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,background:isLive?UA.greenBg:needs?UA.redLight:UA.navyLight,color:isLive?UA.green:needs?UA.red:UA.navy,display:"flex",alignItems:"center",gap:3}}>
                  {isLive&&<span style={{width:5,height:5,borderRadius:"50%",background:UA.green}}/>}
                  {isLive?"Live now":needs?"Needs attention":"Earlier today"}
                </span>
              </div>
            </button>;
          })}
        </div>
      </div>
      {sel&&<aside style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:13,overflow:"hidden",position:"sticky",top:20}}>
        <div style={{padding:"14px 16px",borderBottom:`1px solid ${UA.border}`,display:"flex",alignItems:"center",gap:11}}>
          <Av name={sel.student.full_name} size={40} color={RC[sel.student.risk_level]||UA.green}/>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,color:UA.text}}>{sel.student.full_name}</div><div style={{marginTop:4}}><RBadge level={sel.student.risk_level} score={sel.student.risk_score}/></div></div>
        </div>
        {sel.latest?.assignment_title&&<div style={{padding:"12px 16px",borderBottom:`1px solid ${UA.border}`}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:UA.muted,marginBottom:6}}>Working on</div>
          <div style={{background:UA.bg,borderRadius:8,padding:"9px 11px"}}><div style={{fontSize:13,fontWeight:600,color:UA.text}}>{sel.latest.assignment_title}</div>{sel.latest.course_code&&<div style={{fontSize:11,color:UA.muted,marginTop:2}}>{sel.latest.course_code}</div>}</div>
        </div>}
        <div style={{padding:"12px 16px",borderBottom:`1px solid ${UA.border}`}}>
          <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:UA.muted,marginBottom:8}}>Session signals</div>
          {[["Time",`${Math.round(sel.totalTime/60)} min`,false],["Effort",sel.avgE?`${sel.avgE}/5`:"—",sel.avgE&&parseFloat(sel.avgE)<2.5],["Understanding",sel.avgU?`${sel.avgU}/5`:"—",sel.avgU&&parseFloat(sel.avgU)<2.5]].map(([l,v,w],i,arr)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",fontSize:12,borderBottom:i<arr.length-1?`1px solid ${UA.border}`:"none"}}><span style={{color:UA.muted}}>{l}</span><span style={{fontWeight:700,color:w?UA.red:UA.text}}>{v}</span></div>)}
        </div>
        <div style={{padding:"12px 16px",display:"flex",flexDirection:"column",gap:7}}>
          <button onClick={()=>go("student_detail",{studentId:sel.student.id,studentData:sel.student})} style={{width:"100%",padding:"9px",borderRadius:9,border:"none",background:UA.navy,color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Open student profile →</button>
          <button onClick={()=>go("pstudyhall",{studentId:sel.student.id,studentData:sel.student})} style={{width:"100%",padding:"9px",borderRadius:9,border:`1px solid ${UA.border}`,background:"#fff",color:UA.text,fontSize:12,fontWeight:600,cursor:"pointer"}}>Preview student study hall</button>
        </div>
      </aside>}
    </div>}
  </div>;
}

// ─── IMPORT HUB ───────────────────────────────────────────────────────────────
function ImportHub(){
  const[students,setStudents]=useState([]);
  const[selId,setSelId]=useState(null);
  const[rows,setRows]=useState([{title:"",code:"",due:"",pts:""}]);
  const[saved,setSaved]=useState(false);
  const[loading,setLoading]=useState(true);
  useEffect(()=>{getAllStudents().then(data=>{setStudents(data);if(data.length)setSelId(sid(data[0])||data[0].id);setLoading(false);});},[]);
  const upd=(i,k,v)=>setRows(p=>p.map((r,x)=>x===i?{...r,[k]:v}:r));
  async function save(){
    const valid=rows.filter(r=>r.title.trim()&&r.due);if(!valid.length||!selId)return;
    for(const r of valid){const d=(new Date(r.due)-Date.now())/86400000;await createAssign({student_id:selId,title:r.title,course:r.code||"Course",course_code:r.code,due_date:r.due,points:parseInt(r.pts)||0,status:"not_started",urgency:d<3?"red":d<7?"yellow":"green"});}

// ─── WORK MODE ────────────────────────────────────────────────────────────────
function WorkMode({assignmentId,studentId,go}){
  const[a,setA]=useState(null);
  const[body,setBody]=useState("");
  const[savedAt,setSavedAt]=useState(null);
  const[loading,setLoading]=useState(true);
  const[teach,setTeach]=useState(false);
  const[coach,setCoach]=useState(false);
  const[flagged,setFlagged]=useState(false);
  const[wordTarget,setWordTarget]=useState(null);
  const[targetLabel,setTargetLabel]=useState("");
  const LOCAL=`cats_work_${assignmentId}`;

  // Extract or AI-determine the word count target for this specific assignment
  async function determineWordTarget(asgn){
    const instr=(asgn?.instructions||asgn?.description||"");
    // 1. Look for explicit word counts in the prompt first (fastest, most accurate)
    const explicit=instr.match(/(\d[\d,]*)\s*[-–to]+\s*(\d[\d,]*)\s*word/i);
    if(explicit){
      const lo=parseInt(explicit[1].replace(/,/g,""));
      const hi=parseInt(explicit[2].replace(/,/g,""));
      setWordTarget(Math.round((lo+hi)/2));
      setTargetLabel(`${lo.toLocaleString()}–${hi.toLocaleString()} words`);
      return;
    }
    const single=instr.match(/(\d[\d,]+)\s*[-–]?\s*word/i);
    if(single){
      const n=parseInt(single[1].replace(/,/g,""));
      setWordTarget(n);
      setTargetLabel(`${n.toLocaleString()} words`);
      return;
    }
    // 2. Look for structural clues: "12 events", "3 paragraphs", "5 examples"
    const events=instr.match(/(\d+)\s*(key\s+)?event/i);
    const paras=instr.match(/(\d+)\s*paragraph/i);
    const examples=instr.match(/(\d+)\s*(specific\s+)?(example|case|source)/i);
    if(events){const n=parseInt(events[1]);const est=n*120;setWordTarget(est);setTargetLabel(`~${est.toLocaleString()} words (${n} events × ~120 words each)`);return;}
    if(paras){const n=parseInt(paras[1]);const est=n*150;setWordTarget(est);setTargetLabel(`~${est.toLocaleString()} words (${n} paragraphs)`);return;}
    if(examples){const n=parseInt(examples[1]);const est=Math.max(400,n*100);setWordTarget(est);setTargetLabel(`~${est.toLocaleString()} words`);return;}
    // 3. Ask AI — only if prompt gives no structural clues
    try{
      const raw=await callAI(`Read this assignment prompt and return ONLY a JSON object with two fields: target (integer word count) and label (short description like "600-800 words" or "~1,400 words (12 events)"). No other text.\n\nAssignment: "${asgn?.title||""}"\nPrompt: ${instr.slice(0,400)}\n\nReturn: {"target":800,"label":"600-800 words"}`,6000);
      const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
      if(parsed?.target){setWordTarget(parsed.target);setTargetLabel(parsed.label||`${parsed.target} words`);}
      else{setWordTarget(600);setTargetLabel("~600 words");}
    }catch{setWordTarget(600);setTargetLabel("~600 words");}
  }
  useEffect(()=>{(async()=>{const asgn=await getAssignment(assignmentId);setA(asgn);try{setBody(localStorage.getItem(LOCAL)||"");}catch{}setLoading(false);if(asgn?.status==="not_started")updateAssign(assignmentId,{status:"in_progress"}).catch(()=>{});if(asgn)determineWordTarget(asgn);})();},[assignmentId]);
  useEffect(()=>{if(!body||loading)return;const t=setTimeout(()=>{try{localStorage.setItem(LOCAL,body);}catch{}setSavedAt(new Date());},800);return()=>clearTimeout(t);},[body,loading]);
  async function flag(){if(!a?.student_id)return;await createNote({student_id:a.student_id,author:"Flag from Work Mode",author_initials:"WM",category:"Concern Flag",text:`Student flagged "${a.title}" for learning specialist review.`});setFlagged(true);setTimeout(()=>setFlagged(false),2500);}
  if(loading)return <PL/>;
  if(!a)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",color:UA.muted,fontSize:14}}>Assignment not found.</div>;
  const words=body.trim()?body.trim().split(/\s+/).length:0;
  const pct=wordTarget?Math.min(100,Math.round(words/wordTarget*100)):0;
  return <div style={{display:"flex",flexDirection:"column",minHeight:"100vh"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",background:"#fff",borderBottom:`1px solid ${UA.border}`,flexShrink:0,position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:14,minWidth:0}}>
        <button onClick={()=>go(studentId?"pstudyhall":"monitor")} style={{fontSize:13,color:UA.muted,background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:5,padding:"6px 10px",borderRadius:8,flexShrink:0,whiteSpace:"nowrap"}}>← Back</button>
        <div style={{width:1,height:20,background:UA.border,flexShrink:0}}/>
        <div style={{minWidth:0}}><div style={{fontSize:14,fontWeight:700,color:UA.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.title}</div><div style={{fontSize:12,color:UA.muted,marginTop:1}}>{a.course_code||a.course} · {a.dueLabel} · {a.points||0} pts</div></div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
        <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,padding:"4px 10px",borderRadius:99,background:UA.navyLight,color:UA.navy}}><span style={{width:5,height:5,borderRadius:"50%",background:UA.green}}/>In Study Hall</span>
        {savedAt&&<span style={{fontSize:12,color:UA.green,whiteSpace:"nowrap"}}>✓ Saved</span>}
        <a href={a?.d2l_link||"https://d2l.arizona.edu"} target="_blank" rel="noopener noreferrer" style={{display:"inline-flex",alignItems:"center",gap:6,padding:"6px 13px",borderRadius:8,border:`1.5px solid ${UA.navyBd}`,background:UA.navyLight,fontSize:12,fontWeight:700,color:UA.navy,textDecoration:"none",whiteSpace:"nowrap",transition:"all .15s"}} onMouseEnter={e=>{e.currentTarget.style.background=UA.navy;e.currentTarget.style.color="#fff";}} onMouseLeave={e=>{e.currentTarget.style.background=UA.navyLight;e.currentTarget.style.color=UA.navy;}}>
          <span style={{fontSize:14}}>📤</span>Submit in D2L
        </a>
      </div>
    </div>
    <div style={{flex:1,display:"flex",justifyContent:"center",padding:"32px 20px 120px",background:"#FAFBFD",overflowY:"auto"}}>
      <div style={{width:"100%",maxWidth:720,background:"#fff",border:`1px solid ${UA.border}`,borderRadius:13,padding:"48px 56px",minHeight:480}}>
        {(a.instructions||a.description)&&<div style={{fontSize:13,marginBottom:24,paddingBottom:18,borderBottom:`1px solid ${UA.border}`,color:UA.muted,lineHeight:1.75}}><span style={{fontWeight:700,color:UA.text}}>Prompt: </span>{a.instructions||a.description}</div>}
        <textarea value={body} onChange={e=>setBody(e.target.value)} placeholder="Start writing here…" autoFocus style={{width:"100%",outline:"none",resize:"none",fontSize:15,lineHeight:1.85,border:"none",background:"transparent",color:UA.text,minHeight:360,fontFamily:"inherit"}}/>
      </div>
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 20px",background:"#fff",borderTop:`1px solid ${UA.border}`,flexWrap:"wrap",gap:8,zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:16,fontSize:12,color:UA.muted,flexWrap:"wrap"}}>
        <span><b style={{color:UA.text}}>{words.toLocaleString()}</b> words</span>
        {wordTarget&&<span style={{display:"flex",alignItems:"center",gap:6}}>
          <div style={{width:80,height:4,background:UA.border,borderRadius:99,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:pct>=100?UA.green:UA.navy,borderRadius:99,transition:"width .3s"}}/>
          </div>
          <span><b style={{color:pct>=100?UA.green:UA.text}}>{pct}%</b> of target</span>
        </span>}
        {targetLabel&&!wordTarget&&<span style={{color:UA.muted,fontStyle:"italic",fontSize:11}}>Calculating target…</span>}
        {targetLabel&&<span style={{fontSize:11,color:UA.muted}}>{targetLabel}</span>}
        {savedAt&&<span>Saved {Math.max(1,Math.round((Date.now()-savedAt)/1000))}s ago</span>}
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        {flagged&&<span style={{fontSize:12,fontWeight:700,color:UA.green}}>Flagged ✓</span>}
        <button onClick={flag} style={{fontSize:13,fontWeight:600,padding:"7px 14px",borderRadius:9,border:`1px solid ${UA.border}`,background:"#fff",color:UA.text,cursor:"pointer"}}>Flag for LS</button>
      </div>
    </div>
    <button onClick={()=>{setTeach(true);setCoach(false);}} style={{position:"fixed",bottom:72,right:220,display:"flex",alignItems:"center",gap:8,padding:"11px 18px",borderRadius:99,fontSize:13,fontWeight:600,background:"#fff",border:`1.5px solid ${UA.navy}`,color:UA.navy,cursor:"pointer",zIndex:40,boxShadow:"0 4px 20px rgba(0,0,0,.12)"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="none"}>
      <span style={{width:22,height:22,borderRadius:999,background:UA.navyLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🎓</span>Teach Me
    </button>
    <button onClick={()=>{setCoach(true);setTeach(false);}} style={{position:"fixed",bottom:72,right:16,display:"flex",alignItems:"center",gap:8,padding:"11px 18px",borderRadius:99,fontSize:13,fontWeight:600,background:UA.navy,color:"#fff",cursor:"pointer",zIndex:40,boxShadow:"0 4px 20px rgba(0,51,102,.3)"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="none"}>
      <span style={{width:22,height:22,borderRadius:999,background:"rgba(255,255,255,.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11}}>✦</span>Ask the coach<span style={{width:6,height:6,borderRadius:"50%",background:"#FCD34D"}}/>
    </button>
    {teach&&<TeachMePanel assignment={a} onClose={()=>setTeach(false)}/>}
    {coach&&<CoachPanel assignment={a} draft={body} onClose={()=>setCoach(false)} onInsert={txt=>{setBody(prev=>(prev?prev+"\n\n":"")+txt);setCoach(false);}}/>}
  </div>;
}

// ─── STUDENT ASSIGNMENTS ──────────────────────────────────────────────────────
function StudentAssign({student,go}){
  const[assigns,setAssigns]=useState([]);
  const[loading,setLoading]=useState(true);
  const[search,setSearch]=useState("");
  useEffect(()=>{if(!student?.id)return;getAssignments(student.id).then(a=>{setAssigns(a);setLoading(false);});},[student?.id]);
  async function hStatus(id,status){await updateAssign(id,{status});setAssigns(p=>p.map(a=>a.id===id?{...a,status}:a));}
  if(loading)return <PL/>;
  const filtered=assigns.filter(a=>(a.title+" "+a.course).toLowerCase().includes(search.toLowerCase()));
  const now=new Date();const in7=new Date(now);in7.setDate(now.getDate()+7);
  const groups={overdue:filtered.filter(a=>a.isOverdue&&a.status!=="completed"),thisWeek:filtered.filter(a=>!a.isOverdue&&a.status!=="completed"&&a.due&&a.due>=now&&a.due<=in7),upcoming:filtered.filter(a=>!a.isOverdue&&a.status!=="completed"&&(!a.due||a.due>in7)),completed:filtered.filter(a=>a.status==="completed")};
  const gM={overdue:{l:"🔴 Past Due",c:UA.red},thisWeek:{l:"📅 Due This Week",c:UA.yellow},upcoming:{l:"🟢 Upcoming",c:UA.green},completed:{l:"✅ Completed",c:UA.muted}};
  return <div style={{padding:"20px 24px",maxWidth:800,margin:"0 auto",display:"flex",flexDirection:"column",gap:14,paddingBottom:48}}>
    <h1 style={{fontSize:22,fontWeight:800,color:UA.text,letterSpacing:"-.02em"}}>My Assignments</h1>
    <div style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:12,padding:12}}><input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search…" style={{width:"100%",padding:"9px 13px",borderRadius:9,border:`1.5px solid ${UA.border}`,fontSize:13,outline:"none",background:UA.bg}} onFocus={e=>e.target.style.borderColor=UA.navy} onBlur={e=>e.target.style.borderColor=UA.border}/></div>
    {Object.entries(groups).map(([key,items])=>{if(!items.length)return null;const m=gM[key];return <div key={key} style={{display:"flex",flexDirection:"column",gap:7}}>
      <div style={{fontSize:13,fontWeight:800,color:m.c}}>{m.l} · {items.length}</div>
      {items.map(a=><div key={a.id} style={{background:"#fff",border:`1px solid ${UA.border}`,borderRadius:11,padding:"12px 15px",display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>go("workmode",{assignmentId:a.id,studentId:student.id})} onMouseEnter={e=>e.currentTarget.style.boxShadow="0 3px 14px rgba(0,0,0,.07)"} onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
        <div style={{width:3,alignSelf:"stretch",borderRadius:99,flexShrink:0,background:a.urgency==="red"?UA.red:a.urgency==="yellow"?UA.yellow:UA.green}}/>
        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:13,color:UA.text}}>{a.title}</div><div style={{fontSize:11,color:UA.muted,marginTop:2}}>{a.course} · {a.dueLabel} · {a.points||0} pts</div></div>
        <SBadge status={a.status}/>
        {a.status!=="completed"?<button onClick={e=>{e.stopPropagation();hStatus(a.id,"completed");}} style={{padding:"5px 10px",borderRadius:8,border:`1.5px solid ${UA.greenBd}`,background:UA.greenBg,color:UA.green,fontSize:11,fontWeight:700,cursor:"pointer"}}>✓ Done</button>
        :<button onClick={e=>{e.stopPropagation();hStatus(a.id,"not_started");}} style={{padding:"5px 10px",borderRadius:8,border:`1.5px solid ${UA.border}`,background:UA.bg,color:UA.muted,fontSize:11,fontWeight:700,cursor:"pointer"}}>↩ Undo</button>}
      </div>)}
    </div>;})}
  </div>;
}

async function seedAssignments(onProgress, onDone){
  const students = await getAllStudents();
  if(!students.length){onProgress("No students found in database.");return;}

  let total=0, skipped=0;
  for(let i=0;i<students.length;i++){
    const s=students[i];
    const studentId=sid(s)||s.id;
    if(!studentId){skipped++;continue;}

    // Check if this student already has assignments
    const existing=await getAssignments(studentId);
    if(existing.length>=3){onProgress(`${s.full_name}: already has ${existing.length} assignments, skipping.`);skipped++;continue;}

    // Pick a slot (cycle through if more students than slots)
    const slot=STUDENT_ASSIGNMENTS[i%STUDENT_ASSIGNMENTS.length];
    const now=new Date();

    for(const tmpl of slot){
      const due=new Date(now);
      due.setDate(due.getDate()+(tmpl.days_from_now||0));
      const dueStr=due.toISOString().split("T")[0];
      try{
        await createAssign({
          student_id:studentId,
          title:tmpl.title,
          course:tmpl.course,
          course_code:tmpl.course_code,
          due_date:dueStr,
          points:tmpl.points||50,
          status:tmpl.status||"not_started",
          urgency:tmpl.urgency||"green",
          description:tmpl.description||"",
          instructions:tmpl.instructions||"",
        });
        total++;
      }catch(e){console.warn("Seed error:",e?.message);}
    }
    onProgress(`${s.full_name}: added ${slot.length} assignments ✓`);
  }
  onDone(`Done — ${total} assignments created across ${students.length-skipped} student${students.length-skipped!==1?"s":""}.${skipped>0?` (${skipped} skipped — already had data)`:""}`);
}


// ─── SETTINGS ─────────────────────────────────────────────────────────────────

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function Login({onLogin}){
  const[email,setEmail]=useState("");
  const[pwd,setPwd]=useState("");
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  async function submit(e){e.preventDefault();setErr("");setLoading(true);try{const{data,error}=await sb.auth.signInWithPassword({email,password:pwd});if(error)throw error;onLogin(data.user);}catch(e){setErr(e.message||"Invalid email or password");}setLoading(false);}
  return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:UA.bg}}>
    <div style={{background:"#fff",borderRadius:18,padding:"40px 44px",width:"100%",maxWidth:420,boxShadow:"0 8px 48px rgba(0,0,0,.1)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:52,height:52,borderRadius:13,background:UA.red,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,color:"#fff",fontSize:24,margin:"0 auto 16px",boxShadow:"0 4px 16px rgba(171,0,32,.35)"}}>A</div>
        <div style={{fontSize:22,fontWeight:800,color:UA.text,letterSpacing:"-.02em"}}>CATS Academic</div>
        <div style={{fontSize:13,color:UA.muted,marginTop:4}}>University of Arizona · Learning Support</div>
      </div>
      {err&&<div style={{background:UA.redLight,border:`1px solid ${UA.redBd}`,borderRadius:9,padding:"10px 14px",fontSize:13,color:UA.red,marginBottom:16}}>{err}</div>}
      <form onSubmit={submit} style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={{fontSize:12,fontWeight:700,color:UA.muted,display:"block",marginBottom:6}}>Email</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} required autoFocus placeholder="you@arizona.edu" style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${UA.border}`,fontSize:13,outline:"none"}} onFocus={e=>e.target.style.borderColor=UA.navy} onBlur={e=>e.target.style.borderColor=UA.border}/></div>
        <div><label style={{fontSize:12,fontWeight:700,color:UA.muted,display:"block",marginBottom:6}}>Password</label><input type="password" value={pwd} onChange={e=>setPwd(e.target.value)} required placeholder="••••••••" style={{width:"100%",padding:"11px 14px",borderRadius:10,border:`1.5px solid ${UA.border}`,fontSize:13,outline:"none"}} onFocus={e=>e.target.style.borderColor=UA.navy} onBlur={e=>e.target.style.borderColor=UA.border}/></div>
        <button type="submit" disabled={loading} style={{padding:"13px",borderRadius:10,border:"none",background:UA.navy,color:"#fff",fontSize:14,fontWeight:700,cursor:loading?"wait":"pointer",marginTop:4,opacity:loading?.7:1}}>{loading?"Signing in…":"Log in"}</button>
      </form>
    </div>
  </div>;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const[authUser,setAuthUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[student,setStudent]=useState(null);
  const[role,setRole]=useState(null);
  const[page,setPage]=useState("home");
  const[params,setParams]=useState({});
  const[checking,setChecking]=useState(true);

  async function init(user){
    if(!user){setAuthUser(null);setProfile(null);setRole(null);setStudent(null);setChecking(false);return;}
    setAuthUser(user);
    try{
      // Check if this user has a student record first
      const [p, s] = await Promise.all([getProfile(user.id), getStudent(user.id)]);
      setProfile(p);
      if(s){
        // Student found — student view
        setStudent({...s,id:user.id});
        setRole("student");
        setPage("phome");
      } else {
        // No student record — staff view
        setRole("staff");
        setPage("home");
      }
    }catch(e){
      console.warn("Auth init error:", e?.message);
      setRole("staff");
      setPage("home");
    }
    setChecking(false);
  }

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>init(session?.user||null));
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>{if(!checking)init(session?.user||null);});
    return()=>subscription.unsubscribe();
  },[]);

  function go(p,prms={}){setPage(p);setParams(prms);}
  async function out(){await sb.auth.signOut();setAuthUser(null);setProfile(null);setRole(null);setStudent(null);setPage("home");}

  if(checking)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:UA.bg}}><Spin size={40}/></div>;
  if(!authUser)return <Login onLogin={user=>init(user)}/>;

  const staffUser={full_name:profile?.full_name||authUser.email?.split("@")[0]||"Staff",email:authUser.email||""};

  if(page==="workmode")return <WorkMode assignmentId={params.assignmentId} studentId={params.studentId||student?.id} go={go}/>;

  return <div style={{display:"flex",height:"100vh",overflow:"hidden"}}>
    <Sidebar role={role||"staff"} user={role==="student"?(student||staffUser):staffUser} page={page} go={go} out={out}/>
    <div style={{flex:1,overflowY:"auto"}}>
      {role==="staff"&&page==="home"&&<StaffHome user={staffUser} go={go}/>}
      {role==="staff"&&page==="roster"&&<Roster go={go}/>}
      {role==="staff"&&page==="student_detail"&&<StudentDetail studentId={params.studentId} studentData={params.studentData} go={go}/>}
      {role==="staff"&&page==="monitor"&&<Monitor go={go}/>}
      {role==="staff"&&page==="pstudyhall"&&<StudyHall student={params.studentData||{id:params.studentId}} go={go}/>}
      {role==="staff"&&page==="import"&&<ImportHub/>}
      {role==="staff"&&page==="notes"&&<NotesFeed/>}
      {role==="staff"&&page==="allassign"&&<AllAssign go={go}/>}
      {role==="staff"&&page==="settings"&&<Settings/>}
      {role==="student"&&page==="phome"&&<StudentHome student={student} go={go}/>}
      {role==="student"&&page==="pstudyhall"&&<StudyHall student={student} go={go}/>}
      {role==="student"&&page==="passign"&&<StudentAssign student={student} go={go}/>}
      {role==="student"&&page==="settings"&&<Settings/>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
